<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Intern Booking System</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<!-- Firebase (สำหรับซิงค์ข้อมูลแบบเรียลไทม์ข้ามเครื่อง) — ถ้าไม่ได้ตั้งค่า FIREBASE_CONFIG ระบบจะข้ามส่วนนี้ไปอัตโนมัติและใช้ LocalStorage อย่างเดียวแทน -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&family=Kanit:wght@300;400;500;600&family=JetBrains+Mono:wght@500;600&display=swap');

:root{
  --navy:#1F2A44; --navy-2:#2B3A5C; --navy-3:#141C30;
  --gold:#D9A441; --gold-2:#F0C878; --gold-dim: rgba(217,164,65,.14);
  --white:#ffffff;
  --bg:#F4F6F9; --surface:#ffffff; --border:#E4E8EF;
  --text:#1F2A44; --text-muted:#6B7385; --text-faint:#9AA2B1;
  --green:#1E8A5F; --green-bg:#E5F5EC;
  --orange:#C9791E; --orange-bg:#FCF0DD;
  --red:#C13B32; --red-bg:#FBEAE8;
  --blue:#2E6FE0; --blue-bg:#E7EFFD;
  --radius:16px; --radius-sm:10px;
  --shadow: 0 2px 8px rgba(20,28,48,.06), 0 8px 24px rgba(20,28,48,.06);
  --shadow-lg: 0 12px 40px rgba(20,28,48,.16);
}
html.dark{
  --bg:#12172A; --surface:#1B2238; --border:#2B3450;
  --text:#EDEFF5; --text-muted:#A7AEC2; --text-faint:#6C7590;
  --navy-2:#26314F;
  --green-bg:#123829; --orange-bg:#3A2A10; --red-bg:#3A1917; --blue-bg:#132A4D;
  --shadow: 0 2px 8px rgba(0,0,0,.3), 0 8px 24px rgba(0,0,0,.3);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:'Prompt','Kanit',sans-serif;
  background:var(--bg); color:var(--text);
  -webkit-font-smoothing:antialiased;
  min-height:100vh;
}
.mono{font-family:'JetBrains Mono',monospace;}
button,input,select,textarea{font-family:inherit;}
button{cursor:pointer; border:none; background:none;}
a{color:inherit;}
.hidden{display:none !important;}
::-webkit-scrollbar{width:8px;height:8px;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}

/* ---------- Buttons ---------- */
.btn{
  display:inline-flex; align-items:center; justify-content:center; gap:8px;
  padding:12px 20px; border-radius:10px; font-weight:600; font-size:14px;
  transition:transform .12s ease, box-shadow .12s ease, opacity .12s ease, background .12s ease;
}
.btn:active{transform:scale(.97);}
.btn:focus-visible{outline:2px solid var(--gold); outline-offset:2px;}
.btn-primary{background:var(--navy); color:#fff;}
.btn-primary:hover{box-shadow:var(--shadow-lg);}
.btn-gold{background:var(--gold); color:var(--navy-3);}
.btn-gold:hover{box-shadow:0 8px 24px rgba(217,164,65,.35);}
.btn-outline{background:transparent; border:1.5px solid var(--border); color:var(--text);}
.btn-outline:hover{border-color:var(--navy);}
.btn-ghost{background:transparent; color:var(--text-muted); padding:8px 12px;}
.btn-ghost:hover{color:var(--text);}
.btn-danger{background:var(--red-bg); color:var(--red);}
.btn-sm{padding:8px 14px; font-size:13px; border-radius:8px;}
.btn-icon{padding:9px; border-radius:8px;}
.btn:disabled{opacity:.45; cursor:not-allowed; box-shadow:none; transform:none;}

/* ---------- Loading ---------- */
#loading-screen{
  position:fixed; inset:0; background:var(--navy); display:flex; flex-direction:column;
  align-items:center; justify-content:center; z-index:999; gap:18px;
}
.spinner{
  width:40px; height:40px; border-radius:50%;
  border:3px solid rgba(217,164,65,.25); border-top-color:var(--gold);
  animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}
#loading-screen .brand{font-family:'Prompt'; font-weight:700; color:#fff; letter-spacing:.5px; font-size:15px;}
#loading-screen .brand span{color:var(--gold);}

/* ---------- Login ---------- */
#login-view{
  min-height:100vh; display:flex; align-items:center; justify-content:center;
  background:
    radial-gradient(1200px 600px at 15% -10%, rgba(217,164,65,.10), transparent),
    radial-gradient(900px 500px at 110% 110%, rgba(217,164,65,.08), transparent),
    var(--navy);
  padding:20px;
}
.login-card{
  width:100%; max-width:400px; background:var(--surface); border-radius:20px;
  padding:40px 32px 32px; box-shadow:var(--shadow-lg); position:relative; overflow:hidden;
}
.login-card::before{
  content:''; position:absolute; top:0; left:0; right:0; height:5px;
  background:linear-gradient(90deg, var(--navy), var(--gold));
}
.login-logo{
  width:56px; height:56px; border-radius:14px; background:var(--navy);
  display:flex; align-items:center; justify-content:center; margin:0 auto 18px;
}
.login-title{font-family:'Prompt'; font-weight:700; font-size:21px; text-align:center; margin:0 0 4px;}
.login-sub{text-align:center; color:var(--text-muted); font-size:13px; margin:0 0 28px;}
.field{margin-bottom:16px;}
.field label{display:block; font-size:12.5px; font-weight:600; color:var(--text-muted); margin-bottom:6px;}
.field .input-wrap{position:relative;}
.field .input-wrap svg{position:absolute; left:13px; top:50%; transform:translateY(-50%); color:var(--text-faint);}
.field input, .field select, .field textarea{
  width:100%; padding:12px 14px; border-radius:10px; border:1.5px solid var(--border);
  background:var(--bg); color:var(--text); font-size:14px; transition:border-color .15s ease;
}
.field .input-wrap input{padding-left:40px;}
.field input:focus, .field select:focus, .field textarea:focus{outline:none; border-color:var(--gold);}
.field.error input, .field.error select{border-color:var(--red);}
.field .err-msg{color:var(--red); font-size:11.5px; margin-top:4px; display:none;}
.field.error .err-msg{display:block;}
.login-demo{
  margin-top:18px; padding:12px 14px; background:var(--gold-dim); border-radius:10px;
  font-size:12px; color:var(--text-muted); line-height:1.7;
}
.login-demo b{color:var(--text);}
.role-toggle{display:flex; background:var(--bg); border-radius:10px; padding:4px; margin-bottom:20px; gap:4px;}
.role-toggle button{flex:1; padding:9px; border-radius:7px; font-size:13px; font-weight:600; color:var(--text-muted);}
.role-toggle button.active{background:var(--surface); color:var(--navy); box-shadow:var(--shadow);}

/* ---------- App Shell ---------- */
#app-view{display:none; min-height:100vh;}
.topbar{
  position:sticky; top:0; z-index:40; background:var(--navy); color:#fff;
  padding:0 20px; display:flex; align-items:center; justify-content:space-between; height:64px;
  box-shadow:0 2px 12px rgba(0,0,0,.15);
}
.topbar-left{display:flex; align-items:center; gap:12px; font-family:'Prompt'; font-weight:600;}
.topbar-left .logo-mark{width:32px;height:32px;border-radius:8px;background:var(--gold); display:flex;align-items:center;justify-content:center; color:var(--navy-3); flex-shrink:0;}
.topbar-left .brandline{display:flex; flex-direction:column; line-height:1.15;}
.topbar-left .brandline .b1{font-size:14.5px;}
.topbar-left .brandline .b2{font-size:10px; color:var(--gold); font-family:'JetBrains Mono'; letter-spacing:1px;}
.topbar-right{display:flex; align-items:center; gap:6px;}
.icon-btn{width:38px; height:38px; border-radius:9px; display:flex; align-items:center; justify-content:center; color:rgba(255,255,255,.85); position:relative;}
.icon-btn:hover{background:rgba(255,255,255,.1);}
.user-chip{display:flex; align-items:center; gap:8px; padding:6px 10px 6px 6px; border-radius:24px; background:rgba(255,255,255,.08);}
.user-chip .avatar{width:26px;height:26px;border-radius:50%; background:var(--gold); color:var(--navy-3); display:flex; align-items:center; justify-content:center; font-size:11.5px; font-weight:700;}
.user-chip .uname{font-size:12.5px; font-weight:500; max-width:110px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}

.layout{display:flex; align-items:flex-start;}
.sidebar{
  width:220px; flex-shrink:0; background:var(--surface); border-right:1px solid var(--border);
  min-height:calc(100vh - 64px); padding:16px 12px; position:sticky; top:64px;
}
.sidebar .nav-group-label{font-size:10.5px; font-weight:700; color:var(--text-faint); letter-spacing:.8px; padding:10px 12px 6px; text-transform:uppercase;}
.sidebar .nav-item{
  display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:9px; width:100%;
  font-size:13.5px; font-weight:500; color:var(--text-muted); margin-bottom:2px; text-align:left;
}
.sidebar .nav-item:hover{background:var(--bg); color:var(--text);}
.sidebar .nav-item.active{background:var(--navy); color:#fff;}
.sidebar .nav-item svg{flex-shrink:0;}

.main{flex:1; min-width:0; padding:24px; max-width:1180px; margin:0 auto; width:100%;}
.main.narrow{max-width:820px;}

/* ---------- Hero / Cards ---------- */
.hero{
  background:linear-gradient(120deg, var(--navy) 0%, var(--navy-2) 100%);
  border-radius:20px; padding:32px 30px; color:#fff; position:relative; overflow:hidden; margin-bottom:20px;
}
.hero::after{
  content:''; position:absolute; right:-60px; top:-60px; width:220px; height:220px; border-radius:50%;
  background:radial-gradient(circle, rgba(217,164,65,.22), transparent 70%);
}
.hero .eyebrow{font-family:'JetBrains Mono'; font-size:11px; letter-spacing:2px; color:var(--gold); font-weight:600; margin-bottom:8px;}
.hero h1{font-family:'Prompt'; font-size:26px; font-weight:700; margin:0 0 6px;}
.hero p{margin:0; color:rgba(255,255,255,.7); font-size:13.5px;}

.summary-grid{display:grid; grid-template-columns:repeat(5,1fr); gap:12px; margin-bottom:24px;}
.stat-card{background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:16px; box-shadow:var(--shadow);}
.stat-card .stat-top{display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:10px;}
.stat-card .stat-icon{width:32px;height:32px;border-radius:9px; display:flex; align-items:center; justify-content:center;}
.stat-card .stat-val{font-family:'Prompt'; font-size:24px; font-weight:700;}
.stat-card .stat-label{font-size:12px; color:var(--text-muted); margin-top:2px;}

.menu-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:14px;}
.menu-card{
  background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:22px;
  text-align:left; transition:transform .16s ease, box-shadow .16s ease, border-color .16s ease; position:relative; overflow:hidden;
}
.menu-card:hover{transform:translateY(-3px); box-shadow:var(--shadow-lg); border-color:transparent;}
.menu-card .m-icon{width:44px;height:44px;border-radius:12px; display:flex; align-items:center; justify-content:center; margin-bottom:14px;}
.menu-card h3{font-family:'Prompt'; font-size:15.5px; font-weight:600; margin:0 0 4px;}
.menu-card p{font-size:12.5px; color:var(--text-muted); margin:0 0 14px; line-height:1.5;}
.menu-card .m-arrow{display:flex; align-items:center; gap:4px; font-size:12.5px; font-weight:600; color:var(--navy);}
html.dark .menu-card .m-arrow{color:var(--gold);}

/* ---------- Section header ---------- */
.section-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:18px; flex-wrap:wrap; gap:10px;}
.section-title{display:flex; align-items:center; gap:10px;}
.section-title .sicon{width:38px;height:38px;border-radius:10px; display:flex; align-items:center; justify-content:center;}
.section-title h2{font-family:'Prompt'; font-size:19px; font-weight:600; margin:0;}
.section-title .ssub{font-size:12px; color:var(--text-muted); font-family:'JetBrains Mono';}
.back-link{display:flex; align-items:center; gap:6px; font-size:13px; color:var(--text-muted); font-weight:500; margin-bottom:14px;}
.back-link:hover{color:var(--text);}

/* ---------- Card / Table shared ---------- */
.panel{background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:20px; box-shadow:var(--shadow);}
.slot-card{
  background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:16px 18px;
  display:flex; align-items:center; justify-content:space-between; gap:14px; margin-bottom:10px; flex-wrap:wrap;
}
.slot-info{display:flex; align-items:center; gap:14px;}
.slot-date-block{
  width:56px; text-align:center; background:var(--bg); border-radius:10px; padding:8px 4px; flex-shrink:0;
}
.slot-date-block .d{font-family:'Prompt'; font-weight:700; font-size:19px; line-height:1;}
.slot-date-block .m{font-size:10px; color:var(--text-muted); margin-top:2px;}
.slot-meta .stime{font-family:'JetBrains Mono'; font-weight:600; font-size:14px;}
.slot-meta .ssub{font-size:12.5px; color:var(--text-muted); margin-top:3px; display:flex; align-items:center; gap:5px; flex-wrap:wrap;}
.badge{display:inline-flex; align-items:center; gap:5px; padding:4px 11px; border-radius:20px; font-size:11.5px; font-weight:700;}
.badge-green{background:var(--green-bg); color:var(--green);}
.badge-orange{background:var(--orange-bg); color:var(--orange);}
.badge-red{background:var(--red-bg); color:var(--red);}
.badge-gray{background:var(--bg); color:var(--text-muted);}
.badge-blue{background:var(--blue-bg); color:var(--blue);}

table.ibs-table{width:100%; border-collapse:collapse; font-size:13.5px;}
table.ibs-table th{
  text-align:left; padding:12px 14px; font-size:11.5px; color:var(--text-muted); font-weight:700;
  border-bottom:1.5px solid var(--border); text-transform:uppercase; letter-spacing:.4px;
}
table.ibs-table td{padding:13px 14px; border-bottom:1px solid var(--border);}
table.ibs-table tr:hover td{background:var(--bg);}
.table-wrap{overflow-x:auto;}

/* ---------- Form ---------- */
.form-grid{display:grid; grid-template-columns:1fr 1fr; gap:14px;}
.form-grid .full{grid-column:1/-1;}
@media(max-width:640px){.form-grid{grid-template-columns:1fr;}}

/* ---------- Modal ---------- */
.modal-overlay{
  position:fixed; inset:0; background:rgba(15,20,35,.55); backdrop-filter:blur(2px);
  display:flex; align-items:center; justify-content:center; z-index:100; padding:16px; animation:fadeIn .15s ease;
}
@keyframes fadeIn{from{opacity:0;} to{opacity:1;}}
.modal-box{
  background:var(--surface); border-radius:18px; width:100%; max-width:560px; max-height:88vh; overflow-y:auto;
  box-shadow:var(--shadow-lg); animation:slideUp .2s ease;
}
@keyframes slideUp{from{transform:translateY(16px); opacity:0;} to{transform:translateY(0); opacity:1;}}
.modal-head{display:flex; align-items:center; justify-content:space-between; padding:20px 22px 0;}
.modal-head h3{font-family:'Prompt'; font-size:17px; font-weight:600; margin:0;}
.modal-body{padding:18px 22px 22px;}
.modal-foot{display:flex; gap:10px; padding:0 22px 22px;}
.modal-foot .btn{flex:1;}

/* ---------- Success card ---------- */
.success-wrap{text-align:center;}
.success-icon{
  width:64px; height:64px; border-radius:50%; background:var(--green-bg); color:var(--green);
  display:flex; align-items:center; justify-content:center; margin:0 auto 14px;
}
.success-ticket{
  border:1.5px dashed var(--border); border-radius:14px; padding:18px; margin-top:16px; text-align:left;
  background:var(--bg);
}
.success-row{display:flex; justify-content:space-between; padding:6px 0; font-size:13px; border-bottom:1px dashed var(--border);}
.success-row:last-child{border-bottom:none;}
.success-row span:first-child{color:var(--text-muted);}
.success-row span:last-child{font-weight:600;}
.qr-mock{width:120px; height:120px; margin:16px auto 0; display:grid; grid-template-columns:repeat(8,1fr); gap:2px; padding:8px; background:#fff; border-radius:8px; border:1px solid var(--border);}
.qr-mock div{aspect-ratio:1;}

/* ---------- Toast ---------- */
#toast-wrap{position:fixed; bottom:24px; left:50%; transform:translateX(-50%); z-index:200; display:flex; flex-direction:column; gap:8px; align-items:center;}
.toast{
  background:var(--navy-3); color:#fff; padding:12px 20px; border-radius:10px; font-size:13.5px; font-weight:500;
  box-shadow:var(--shadow-lg); display:flex; align-items:center; gap:10px; animation:toastIn .2s ease; max-width:90vw;
}
@keyframes toastIn{from{transform:translateY(10px); opacity:0;} to{transform:translateY(0); opacity:1;}}
.toast.success{background:#16523A;}
.toast.error{background:#6B2622;}

/* ---------- Empty state ---------- */
.empty-state{text-align:center; padding:56px 20px; color:var(--text-faint);}
.empty-state svg{margin-bottom:10px; opacity:.5;}
.empty-state p{margin:0; font-size:13.5px;}

/* ---------- Tabs ---------- */
.tabbar{display:flex; gap:4px; border-bottom:1.5px solid var(--border); margin-bottom:18px; overflow-x:auto;}
.tabbar button{padding:11px 16px; font-size:13.5px; font-weight:600; color:var(--text-muted); border-bottom:2.5px solid transparent; white-space:nowrap;}
.tabbar button.active{color:var(--navy); border-color:var(--navy);}
html.dark .tabbar button.active{color:var(--gold); border-color:var(--gold);}

/* ---------- Filters bar ---------- */
.filters-bar{display:flex; gap:10px; margin-bottom:16px; flex-wrap:wrap; align-items:center;}
.search-box{position:relative; flex:1; min-width:200px;}
.search-box svg{position:absolute; left:12px; top:50%; transform:translateY(-50%); color:var(--text-faint);}
.search-box input{width:100%; padding:10px 12px 10px 36px; border-radius:9px; border:1.5px solid var(--border); background:var(--surface); font-size:13.5px;}
.filters-bar select{padding:10px 12px; border-radius:9px; border:1.5px solid var(--border); background:var(--surface); font-size:13.5px;}

/* ---------- Admin dashboard charts ---------- */
.chart-panel{background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:20px; box-shadow:var(--shadow);}
.chart-panel h4{font-family:'Prompt'; font-size:14.5px; margin:0 0 16px; font-weight:600;}
.bar-row{display:flex; align-items:center; gap:10px; margin-bottom:12px;}
.bar-row .b-label{width:110px; font-size:12.5px; color:var(--text-muted); flex-shrink:0;}
.bar-row .b-track{flex:1; height:10px; background:var(--bg); border-radius:6px; overflow:hidden;}
.bar-row .b-fill{height:100%; border-radius:6px; transition:width .5s ease;}
.bar-row .b-val{width:34px; text-align:right; font-size:12.5px; font-weight:700; flex-shrink:0;}

.month-chart{display:flex; align-items:flex-end; gap:14px; height:150px; padding-top:10px;}
.month-chart .m-col{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:flex-end; height:100%; gap:8px;}
.month-chart .m-bar{width:100%; max-width:34px; border-radius:6px 6px 3px 3px; background:linear-gradient(180deg, var(--gold), var(--navy)); transition:height .5s ease;}
.month-chart .m-lbl{font-size:11px; color:var(--text-muted);}

/* ---------- Pagination ---------- */
.pagination{display:flex; align-items:center; justify-content:center; gap:6px; margin-top:16px;}
.pagination button{width:32px;height:32px;border-radius:8px; font-size:13px; font-weight:600; color:var(--text-muted);}
.pagination button.active{background:var(--navy); color:#fff;}
.pagination button:hover:not(.active){background:var(--bg);}

/* ---------- Confirm dialog ---------- */
.confirm-icon{width:52px;height:52px;border-radius:50%; display:flex; align-items:center; justify-content:center; margin:0 auto 12px;}

/* ---------- Responsive ---------- */
@media(max-width:1024px){
  .summary-grid{grid-template-columns:repeat(3,1fr);}
  .menu-grid{grid-template-columns:repeat(2,1fr);}
  .sidebar{position:fixed; left:-240px; top:64px; z-index:60; transition:left .2s ease; box-shadow:var(--shadow-lg);}
  .sidebar.open{left:0;}
  .sidebar-overlay{display:none; position:fixed; inset:64px 0 0 0; background:rgba(0,0,0,.4); z-index:55;}
  .sidebar-overlay.show{display:block;}
}
@media(max-width:640px){
  .summary-grid{grid-template-columns:repeat(2,1fr);}
  .menu-grid{grid-template-columns:1fr;}
  .form-grid{grid-template-columns:1fr;}
  .main{padding:16px;}
  .hero{padding:22px 18px;}
  .topbar-left .brandline .b1{font-size:13px;}
  .user-chip .uname{display:none;}
}
</style>
</head>
<body>

<div id="loading-screen">
  <div class="spinner"></div>
  <div class="brand">INTERN <span>BOOKING</span> SYSTEM</div>
</div>

<div id="login-view" style="display:none;"></div>
<div id="app-view">
  <div class="topbar" id="topbar"></div>
  <div class="layout">
    <div class="sidebar-overlay" id="sidebar-overlay"></div>
    <div class="sidebar hidden" id="sidebar"></div>
    <div class="main" id="main"></div>
  </div>
</div>

<div id="modal-root"></div>
<div id="toast-wrap"></div>

<script>
/* =======================================================================
   หมวด 1: ค่าคงที่ / ไอคอน / Helper วันที่
   ======================================================================= */

const LEAVE_ENTRY_TYPE_LABELS = { sick:'ลาป่วย', personal:'ลากิจ' };
const LEAVE_RATE_PER_MONTH = 0.5; /* ตามนโยบาย: ฝึกงาน 8 เดือน ได้วันลารวม 4 วัน (ลาป่วย+ลากิจรวมกัน) */
function computeGrantedDays(months){
  return Math.round((months||0) * LEAVE_RATE_PER_MONTH * 2) / 2; /* ปัดเศษให้ละเอียดถึงครึ่งวัน */
}
function leaveEntriesFor(empId){ return (DB.leaveBalances[empId]?.entries) || []; }
function leaveGrantedDays(empId){ return computeGrantedDays(DB.leaveBalances[empId]?.internshipMonths || 0); }
function leaveUsedDays(empId){
  return leaveEntriesFor(empId).filter(e=>!e.exempt).reduce((sum,e)=>sum + Number(e.days||0), 0);
}
/* สถานะสีตามสัดส่วนวันลาคงเหลือ: เขียว=ปกติ / ส้ม=ใกล้หมด / แดง=ใช้ครบแล้ว */
function leaveStatus(granted, used){
  const remaining = Math.max(0, (granted||0) - (used||0));
  const ratio = granted>0 ? remaining/granted : 0;
  if(remaining<=0) return { cls:'badge-red', text:'ใช้ครบแล้ว', color:'var(--red)' };
  if(ratio<=0.34) return { cls:'badge-orange', text:'ใกล้หมด', color:'var(--orange)' };
  return { cls:'badge-green', text:'ปกติ', color:'var(--green)' };
}

/* ---- ระยะเวลาฝึกงาน / วันที่คาดว่าจะจบ ---- */
const INTERNSHIP_ENDING_SOON_DAYS = 30;
function internshipMonthsOf(empId){ return DB.leaveBalances[empId]?.internshipMonths || 0; }
function internshipEndDate(empId){
  const u = DB.users.find(x=>x.empId===empId);
  if(!u || !u.startDate) return null;
  const months = internshipMonthsOf(empId);
  const d = new Date(u.startDate+'T00:00:00');
  d.setMonth(d.getMonth() + months);
  return d.toISOString().slice(0,10);
}
function internshipStatus(empId){
  const end = internshipEndDate(empId);
  if(!end) return { label:'ไม่ระบุ', cls:'badge-gray', daysLeft:null, end:null };
  const daysLeft = Math.round((new Date(end+'T00:00:00') - new Date(todayISO()+'T00:00:00')) / 86400000);
  if(daysLeft < 0) return { label:'จบแล้ว', cls:'badge-gray', daysLeft, end };
  if(daysLeft <= INTERNSHIP_ENDING_SOON_DAYS) return { label:'ใกล้จบ', cls:'badge-orange', daysLeft, end };
  return { label:'กำลังฝึกงาน', cls:'badge-green', daysLeft, end };
}
/* สถานะการอบรม Safety ของนักศึกษารายคน: อบรมแล้ว(เขียว) / จองแล้วรออบรม(เหลือง) / ยังไม่ได้จอง(แดง) */
function safetyTrainingStatus(empId){
  const hasCompleted = DB.bookings.some(b=>b.type==='safety' && b.studentEmpId===empId && bookingComputedStatus(b)==='completed');
  if(hasCompleted) return { label:'อบรมแล้ว', cls:'badge-green', emoji:'🟢' };
  const hasUpcoming = DB.bookings.some(b=>b.type==='safety' && b.studentEmpId===empId && bookingComputedStatus(b)==='upcoming');
  if(hasUpcoming) return { label:'จองแล้ว', cls:'badge-orange', emoji:'🟡' };
  return { label:'ยังไม่ได้จอง', cls:'badge-red', emoji:'🔴' };
}
/* Intern Journey: ลำดับขั้นตอนตลอดการฝึกงานของนักศึกษารายคน พร้อมสถานะว่าผ่านหรือยัง */
function internJourney(empId){
  const u = DB.users.find(x=>x.empId===empId);
  const steps = [];
  steps.push({ label:'เข้าฝึกงาน', done: !!(u && u.startDate) });
  const hasSafetyDone = DB.bookings.some(b=>b.type==='safety' && b.studentEmpId===empId && bookingComputedStatus(b)==='completed');
  steps.push({ label:'อบรม Safety', done: hasSafetyDone });
  const hasNiteshDone = DB.bookings.some(b=>b.type==='nitesh' && b.studentEmpId===empId && b.status==='confirmed');
  steps.push({ label:'นิเทศอาจารย์', done: hasNiteshDone });
  const feedbackRounds = DB.bookings.filter(b=>b.type==='feedback' && b.studentEmpId===empId && b.status!=='cancelled')
    .map(b=>({ b, dt:getBookingDateTime(b) })).sort((a,b)=>(a.dt.date||'').localeCompare(b.dt.date||''));
  feedbackRounds.forEach((f,i)=>{
    steps.push({ label:`Feedback เดือนที่ ${i+1}`, done: bookingComputedStatus(f.b)==='completed' });
  });
  const st = internshipStatus(empId);
  steps.push({ label:'สิ้นสุดการฝึกงาน', done: st.label==='จบแล้ว', isFinal:true });
  return steps;
}

function monthKeyOf(dateStr){ return dateStr.slice(0,7); }
function monthLabelTH(monthKey){
  const [y,m] = monthKey.split('-').map(Number);
  return `${THAI_MONTHS[m-1]} ${toBE(y)}`;
}
function defaultDueDateForMonth(monthKey){
  const [y,m] = monthKey.split('-').map(Number);
  return `${y}-${pad(m)}-${pad(new Date(y,m,0).getDate())}`; /* วันสุดท้ายของเดือน */
}
function defaultPayDateFor(dueDateStr){
  /* รอบเบิกบัญชี จ-ศ จ่ายพฤหัสถัดไป: เผื่อเวลาตรวจเอกสาร 1 สัปดาห์ แล้วเลื่อนไปวันพฤหัสที่ใกล้ที่สุด */
  const d = new Date(dueDateStr+'T00:00:00');
  d.setDate(d.getDate()+7);
  while(d.getDay()!==4) d.setDate(d.getDate()+1);
  return d.toISOString().slice(0,10);
}
function allowanceMonthConfig(monthKey){
  if(DB.allowanceMonths && DB.allowanceMonths[monthKey]) return DB.allowanceMonths[monthKey];
  const dueDate = defaultDueDateForMonth(monthKey);
  return { dueDate, payDate: defaultPayDateFor(dueDate), note:'' };
}
function timesheetKey(empId, monthKey){ return `${empId}__${monthKey}`; }
function getTimesheetStatus(empId, monthKey){
  const rec = DB.timesheets && DB.timesheets[timesheetKey(empId, monthKey)];
  return (rec && rec.status) || 'not_submitted';
}
function daysUntil(dateStr){
  return Math.round((new Date(dateStr+'T00:00:00') - new Date(todayISO()+'T00:00:00')) / 86400000);
}

function pad(n){ return String(n).padStart(2,'0'); }
function todayISO(){ return new Date().toISOString().slice(0,10); }
function toBE(y){ return y + 543; }
function formatDateFull(dateStr){
  const d = new Date(dateStr+'T00:00:00');
  return `วันที่ ${d.getDate()} ${THAI_MONTHS[d.getMonth()]} ${toBE(d.getFullYear())}`;
}
function formatDateMid(dateStr){
  const d = new Date(dateStr+'T00:00:00');
  return `${d.getDate()} ${THAI_MONTHS_SHORT[d.getMonth()]} ${toBE(d.getFullYear())}`;
}
function dateBlock(dateStr){
  const d = new Date(dateStr+'T00:00:00');
  return { d: d.getDate(), m: THAI_MONTHS_SHORT[d.getMonth()] };
}
function parseRange(timeStr){
  if(!timeStr) return [0,0];
  if(timeStr.includes('-')){
    const [a,b] = timeStr.split('-');
    const [ah,am] = a.split(':').map(Number);
    const [bh,bm] = b.split(':').map(Number);
    return [ah*60+am, bh*60+bm];
  }
  // เวลาแบบจุดเดียว (เช่น การนิเทศที่ไม่มีช่วงเวลาสิ้นสุดตายตัว) — ถือว่าใช้เวลาประมาณ 1 ชั่วโมง
  const [h,m] = timeStr.split(':').map(Number);
  const start = h*60+m;
  return [start, start+60];
}
function rangesOverlap(r1, r2){ return r1[0] < r2[1] && r2[0] < r1[1]; }
function uid(prefix='id'){ return prefix+'_'+Math.random().toString(36).slice(2,10); }

function initFirebaseIfConfigured(){
  if(!FIREBASE_CONFIG.apiKey || FIREBASE_CONFIG.apiKey.indexOf('YOUR_')===0) return false;
  if(typeof firebase==='undefined') return false;
  try{
    firebase.initializeApp(FIREBASE_CONFIG);
    fbRef = firebase.database().ref('internBookingSystemData');
    return true;
  }catch(e){ console.warn('Firebase init failed', e); return false; }
}

async function loadAll(){
  try{
    const raw = localStorage.getItem(DATA_KEY);
    if(raw){ DB = JSON.parse(raw); }
    else { seedData(); await persist(); }
  }catch(e){ seedData(); await persist(); }
  normalizeLeaveBalances();

  try{
    const raw = localStorage.getItem(SESSION_KEY);
    if(raw){
      const { empId } = JSON.parse(raw);
      const u = DB.users.find(u=>u.empId===empId);
      if(u) STATE.currentUser = u;
    }
  }catch(e){ /* no session yet */ }

  firebaseReady = initFirebaseIfConfigured();
  if(firebaseReady){
    fbRef.on('value', (snapshot)=>{
      const val = snapshot.val();
      if(val){
        DB = val;
        normalizeLeaveBalances();
        try{ localStorage.setItem(DATA_KEY, JSON.stringify(DB)); }catch(e){}
        if(STATE.currentUser) renderRoot(); /* ข้อมูลเปลี่ยนจากเครื่องอื่น -> รีเฟรชหน้าจอทันที */
      } else {
        fbRef.set(DB); /* ฐานข้อมูลกลางยังว่าง -> อัปโหลดชุดข้อมูลปัจจุบันขึ้นไปเป็นชุดแรก */
      }
    }, (err)=>{
      console.warn('Firebase sync error', err);
      showToast('การซิงค์ข้อมูลกับส่วนกลางขัดข้อง ระบบจะใช้ข้อมูลในเครื่องนี้ไปก่อน', 'error');
    });
  }
}
async function persist(){
  try{ localStorage.setItem(DATA_KEY, JSON.stringify(DB)); }
  catch(e){ showToast('บันทึกข้อมูลไม่สำเร็จ พื้นที่จัดเก็บอาจเต็มหรือถูกปิดกั้น', 'error'); }
  if(firebaseReady && fbRef){
    try{ await fbRef.set(DB); }
    catch(e){ showToast('ซิงค์ข้อมูลขึ้นส่วนกลางไม่สำเร็จ (บันทึกไว้ในเครื่องนี้แล้ว)', 'error'); }
  }
}
async function persistSession(empId){
  try{
    if(empId) localStorage.setItem(SESSION_KEY, JSON.stringify({empId}));
    else localStorage.removeItem(SESSION_KEY);
  }catch(e){ /* ignore */ }
}

function showToast(msg, type='default'){
  const wrap = document.getElementById('toast-wrap');
  const el = document.createElement('div');
  el.className = 'toast ' + (type==='success'?'success':type==='error'?'error':'');
  const iconName = type==='success' ? 'checkCircle' : type==='error' ? 'xCircle' : 'bell';
  el.innerHTML = `${ICON(iconName,16)}<span>${msg}</span>`;
  wrap.appendChild(el);
  setTimeout(()=>{ el.style.opacity='0'; el.style.transition='opacity .3s'; setTimeout(()=>el.remove(),300); }, 2800);
}

function remainingOf(type, slot){
  return slot.capacity - activeBookingsForSlot(type, slot.id).length;
}
function slotStatusBadge(type, slot){
  const remaining = remainingOf(type, slot);
  if(!slot.isOpen) return { text:'ปิดรับจอง', cls:'badge-gray' };
  if(remaining<=0) return { text:'เต็ม (Full)', cls:'badge-red' };
  if(remaining <= Math.max(1, Math.ceil(slot.capacity*0.25))) return { text:`เกือบเต็ม (${remaining} ที่)`, cls:'badge-orange' };
  return { text:`ว่าง (${remaining} ที่)`, cls:'badge-green' };
}
/* สถานะรอบ Safety ตามสเปก: เหลือ <=20% ของที่รับ = Almost Full, เหลือ 0 = Full, ปิดรับจอง = ปิด, นอกนั้น Available */
function safetyStatusBadge(slot){
  const remaining = remainingOf('safety', slot);
  if(!slot.isOpen) return { text:'ปิดรับจอง', cls:'badge-gray', remaining };
  if(remaining<=0) return { text:'Full', cls:'badge-red', remaining };
  if(remaining <= slot.capacity*0.2) return { text:'Almost Full', cls:'badge-orange', remaining };
  return { text:'Available', cls:'badge-green', remaining };
}
function hasConflict(empId, dateStr, timeStr, excludeBookingId){
  const r = parseRange(timeStr);
  return DB.bookings.some(b=>{
    if(b.id===excludeBookingId) return false;
    if(b.studentEmpId!==empId || b.status==='cancelled') return false;
    const dt = getBookingDateTime(b);
    if(!dt.date || !dt.time || dt.date!==dateStr) return false;
    return rangesOverlap(parseRange(dt.time), r);
  });
}
function findSlot(type, id){ return (DB.sessions[type]||[]).find(s=>s.id===id); }
function findBooking(id){ return DB.bookings.find(b=>b.id===id); }

/* ---- อบรม Safety: 1 รอบ = วันเต็ม (วันแรก) + ครึ่งวันบ่าย (วันที่สอง) ---- */
function safetyHasDay2(slot){ return !!(slot && slot.day2Date && slot.day2Start && slot.day2End); }
function safetyDateRangeLabel(slot){
  if(!safetyHasDay2(slot)) return formatDateMid(slot.date);
  const d1 = new Date(slot.date+'T00:00:00'), d2 = new Date(slot.day2Date+'T00:00:00');
  if(d1.getFullYear()===d2.getFullYear() && d1.getMonth()===d2.getMonth()){
    return `${d1.getDate()}-${d2.getDate()} ${THAI_MONTHS_SHORT[d1.getMonth()]} ${toBE(d1.getFullYear())}`;
  }
  return `${formatDateMid(slot.date)} – ${formatDateMid(slot.day2Date)}`;
}
function safetyDayLabel(slot){
  if(!safetyHasDay2(slot)) return dayOfWeekFull(slot.date);
  const d1 = dayOfWeekFull(slot.date), d2 = dayOfWeekFull(slot.day2Date);
  return d1===d2 ? d1 : `${d1}-${d2}`;
}
function safetyTimeLabel(slot){
  if(!safetyHasDay2(slot)) return `${slot.time} น.`;
  return `วันแรก ${slot.time} น. · วันที่สอง (บ่าย) ${slot.day2Start}-${slot.day2End} น.`;
}
/* สำหรับกล่องวันที่แบบย่อ (ตัวเลขวันใหญ่ๆ) ให้แสดงเป็นช่วง เช่น "21-22" แทนวันเดียว เมื่อมีวันที่สอง */
function safetyDateBlock(slot){
  const d1 = new Date(slot.date+'T00:00:00');
  if(!safetyHasDay2(slot)) return { d: d1.getDate(), m: THAI_MONTHS_SHORT[d1.getMonth()] };
  const d2 = new Date(slot.day2Date+'T00:00:00');
  return { d: `${d1.getDate()}-${d2.getDate()}`, m: THAI_MONTHS_SHORT[d1.getMonth()] };
}

/* คืนวันที่/เวลาของการจอง ไม่ว่าจะมาจาก slot (safety/feedback) หรือฝังในข้อมูลคำขอเอง (nitesh)
   dateLabel/timeLabel คือข้อความพร้อมแสดงผล (รองรับ Safety ที่เป็นช่วง 2 วัน), block คือกล่องวันที่แบบย่อ */
function getBookingDateTime(b){
  if(b.type==='nitesh'){
    const date = b.data?.visitDate, time = b.data?.visitTime;
    return { date, time, dateLabel: date?formatDateMid(date):'-', timeLabel: time?`${time} น.`:'-', block: date?dateBlock(date):{d:'-',m:''} };
  }
  if(b.type==='safety' && !b.slotId){
    /* บันทึกประวัติย้อนหลังโดย HR ไม่ผูกกับรอบอบรมที่มีอยู่จริง */
    const date = b.data?.manualDate;
    return { date, time:undefined, dateLabel: date?formatDateMid(date):'-', timeLabel: 'บันทึกย้อนหลังโดย HR', block: date?dateBlock(date):{d:'-',m:''} };
  }
  const slot = findSlot(b.type, b.slotId);
  if(!slot) return { date:undefined, time:undefined, dateLabel:'-', timeLabel:'-', block:{d:'-',m:''} };
  if(b.type==='safety'){
    return { date:slot.date, time:slot.time, dateLabel: safetyDateRangeLabel(slot), timeLabel: safetyTimeLabel(slot), block: safetyDateBlock(slot) };
  }
  return { date:slot.date, time:slot.time, dateLabel: slot.date?formatDateMid(slot.date):'-', timeLabel: slot.time?`${slot.time} น.`:'-', block: slot.date?dateBlock(slot.date):{d:'-',m:''} };
}
function renderNiteshStatusBadge(b){
  if(b.status==='pending') return `<span class="badge badge-orange">รอ HR ยืนยัน</span>`;
  if(b.status==='confirmed') return `<span class="badge badge-green">ยืนยันแล้ว</span>`;
  return `<span class="badge badge-red">ยกเลิก</span>`;
}
function statusBadgeForBooking(b){
  if(b.type==='nitesh') return renderNiteshStatusBadge(b);
  return statusBadgeGeneric(bookingComputedStatus(b));
}
function statusLabelForExport(b){
  if(b.type==='nitesh'){
    if(b.status==='pending') return 'รอ HR ยืนยัน';
    if(b.status==='confirmed') return 'ยืนยันแล้ว';
    return 'ยกเลิก';
  }
  const c = bookingComputedStatus(b);
  return c==='completed'?'เสร็จสิ้น':c==='cancelled'?'ยกเลิก':'กำลังจะถึง';
}


async function createBooking(type, slot, formData){
  const u = STATE.currentUser;
  if(hasConflict(u.empId, slot.date, slot.time)){
    showToast('คุณมีการจองในช่วงเวลานี้อยู่แล้ว กรุณาเลือกเวลาอื่น', 'error');
    return null;
  }
  if(remainingOf(type, slot) <= 0){
    showToast('รอบนี้เต็มแล้ว กรุณาเลือกช่วงเวลาอื่น', 'error');
    return null;
  }
  const booking = {
    id: uid('bk'),
    bookingNo: nextBookingNo(type, slot.date),
    type, slotId: slot.id,
    studentEmpId: u.empId, studentName: u.name,
    data: formData, status:'upcoming', createdAt: new Date().toISOString()
  };
  DB.bookings.push(booking);
  addNotification({ audience:'admin', icon:TYPE_META[type].icon, color:TYPE_META[type].color, title:`มีการจอง${TYPE_META[type].label}ใหม่`, detail:`${u.name} จองรอบวันที่ ${formatDateMid(slot.date)}`, link:{role:'admin', adminview:type} });
  await persist();
  return booking;
}

/* =======================================================================
   Notification Center — persistent, event-driven (เก็บใน DB/Firebase เพื่อให้เห็นตรงกันทุกเครื่อง)
   ======================================================================= */
function addNotification(opts){
  if(!DB.notifications) DB.notifications = [];
  const entry = {
    id: uid('nt'),
    audience: opts.audience,               // 'admin' หรือ empId ของนักศึกษา
    icon: opts.icon || 'bell',
    color: opts.color || 'var(--navy)',
    title: opts.title,
    detail: opts.detail || '',
    createdAt: new Date().toISOString(),
    read: false,
    link: opts.link || null,               // { role:'admin', adminview:'nitesh' } หรือ { role:'student', view:'mybookings' }
    dedupKey: opts.dedupKey || null
  };
  if(entry.dedupKey && DB.notifications.some(n=>n.dedupKey===entry.dedupKey)) return; /* กันแจ้งเตือนซ้ำ เช่น reminder รายวัน */
  DB.notifications.unshift(entry);
  if(DB.notifications.length>300) DB.notifications = DB.notifications.slice(0,300); /* กันรายการบวมไม่จำกัด */
}
function notificationsFor(user){
  const key = user.role==='admin' ? 'admin' : user.empId;
  return (DB.notifications||[]).filter(n=>n.audience===key).sort((a,b)=> b.createdAt.localeCompare(a.createdAt));
}
function unreadNotifCount(user){
  return notificationsFor(user).filter(n=>!n.read).length;
}
function timeAgoLabel(iso){
  const diffMin = Math.round((Date.now() - new Date(iso).getTime())/60000);
  if(diffMin<1) return 'เมื่อสักครู่';
  if(diffMin<60) return `${diffMin} นาทีที่แล้ว`;
  const diffHr = Math.round(diffMin/60);
  if(diffHr<24) return `${diffHr} ชม.ที่แล้ว`;
  const diffDay = Math.round(diffHr/24);
  return `${diffDay} วันที่แล้ว`;
}
/* สร้างแจ้งเตือนเตือนความจำก่อนถึงวันนัด (เช็คตอนโหลดแอปแต่ละครั้ง ไม่ใช่ push จริง) */
function generateReminderNotifications(empId){
  const today = todayISO();
  const tomorrow = new Date(today+'T00:00:00'); tomorrow.setDate(tomorrow.getDate()+1);
  const tomorrowISO = tomorrow.toISOString().slice(0,10);
  DB.bookings.filter(b=>b.studentEmpId===empId && b.status!=='cancelled').forEach(b=>{
    let dt = null, label = '';
    if(b.type==='safety'){
      const slot = b.slotId ? findSlot('safety', b.slotId) : null;
      if(slot){ dt = slot.date; label = 'อบรม Safety'; }
    } else if(b.type==='feedback'){
      dt = getBookingDateTime(b).date; label = 'Feedback ประจำเดือน';
    }
    if(!dt) return;
    if(dt===tomorrowISO){
      addNotification({ audience:empId, icon:TYPE_META[b.type].icon, color:'var(--orange)', title:`พรุ่งนี้มี${label}`, detail:'กรุณาเตรียมตัวล่วงหน้า', link:{role:'student', view: b.type==='safety'?'activities':'activities'}, dedupKey:`remind1_${b.id}_${dt}` });
    } else if(dt===today){
      addNotification({ audience:empId, icon:TYPE_META[b.type].icon, color:'var(--red)', title:`วันนี้มี${label}`, detail:'อย่าลืมเข้าร่วมตามเวลานัด', link:{role:'student', view: b.type==='safety'?'activities':'activities'}, dedupKey:`remind0_${b.id}_${dt}` });
    }
  });
  const monthKey = today.slice(0,7);
  const cfg = allowanceMonthConfig(monthKey);
  const dueDays = daysUntil(cfg.dueDate);
  if(dueDays>=0 && dueDays<=1 && getTimesheetStatus(empId, monthKey)==='not_submitted'){
    addNotification({ audience:empId, icon:'fileText', color:'var(--red)', title:'ใกล้ครบกำหนดส่งใบลงเวลา', detail: dueDays===0?'ครบกำหนดวันนี้':'ครบกำหนดพรุ่งนี้', link:{role:'student', view:'allowance-student'}, dedupKey:`tsdue_${empId}_${monthKey}_${dueDays}` });
  }
}

      ? `<button class="back-link" data-act="nav-admin" data-adminview="overview">${ICON('arrowLeft',15)} กลับหน้า Dashboard</button>`
      : '';
    main.innerHTML = backLink + renderAdmin();
    afterRenderCharts();
    return;
  }
  main.className='main narrow';
  switch(STATE.view){
    case 'nitesh': main.innerHTML = renderNiteshView(); break;
    case 'safety': main.innerHTML = renderSafetyView(); break;
    case 'feedback': main.innerHTML = renderFeedbackView(); break;
    case 'mybookings': main.innerHTML = renderMyBookings(); break;
    case 'leave': main.innerHTML = renderLeaveView(); break;
    case 'mycalendar': main.innerHTML = renderMyCalendarView(); break;
    case 'activities': main.innerHTML = renderActivitiesHub(); break;
    case 'allowance-student': main.innerHTML = renderAllowanceStudentView(); break;
    default: main.innerHTML = renderStudentDashboard();
  }
}

function allSlotsFlat(){
  const out = [];
  ['safety','feedback'].forEach(type=>{
    (DB.sessions[type]||[]).forEach(s=>out.push({type, ...s}));
  });
  return out;
}
function studentTodayEvents(empId){
  const today = todayISO();
  const events = [];
  DB.bookings.filter(b=>b.studentEmpId===empId && b.status!=='cancelled').forEach(b=>{
    if(b.type==='nitesh'){
      const dt = getBookingDateTime(b);
      if(dt.date===today) events.push({ type:'nitesh', title:'อาจารย์นิเทศ', time:dt.time });
    } else if(b.type==='safety'){
      const slot = b.slotId ? findSlot('safety', b.slotId) : null;
      if(slot){
        if(slot.date===today) events.push({ type:'safety', title:'Safety Training', time:slot.time });
        else if(slot.day2Date===today) events.push({ type:'safety', title:'Safety Training (วันที่สอง)', time:`${slot.day2Start}-${slot.day2End}` });
      }
    } else if(b.type==='feedback'){
      const dt = getBookingDateTime(b);
      if(dt.date===today) events.push({ type:'feedback', title:'Feedback Meeting', time:dt.time });
    }
  });
  return events;
}
function heroTodayMessage(empId){
  const events = studentTodayEvents(empId);
  if(events.length===0) return 'วันนี้ไม่มีนัดหมาย';
  return events.map(e=>`วันนี้มี${e.title}${e.time?` เวลา ${e.time} น.`:''}`).join(' · ');
}
function todaysChecklist(empId){
  const today = todayISO();
  const items = [];
  studentTodayEvents(empId).forEach(e=>{
    if(e.type==='safety') items.push({ label:'เข้าอบรม Safety', done:false });
    if(e.type==='feedback') items.push({ label:'Feedback ประจำเดือน', done:false });
    if(e.type==='nitesh') items.push({ label:'อาจารย์นิเทศ', done:false });
  });
  const monthKey = today.slice(0,7);
  const cfg = allowanceMonthConfig(monthKey);
  if(cfg.dueDate===today){
    const status = getTimesheetStatus(empId, monthKey);
    items.push({ label:'ส่งใบลงเวลา', done: status!=='not_submitted' && status!=='incomplete' });
  }
  return items;
}
function studentNextEvent(empId){
  const today = todayISO();
  const events = [];
  DB.bookings.filter(b=>b.studentEmpId===empId && b.status!=='cancelled').forEach(b=>{
    if(b.type==='nitesh'){
      const dt = getBookingDateTime(b);
      if(dt.date && dt.date>=today) events.push({ title:'อาจารย์นิเทศ', date:dt.date, time:dt.time, icon:'calendar', color:'#C9A227' });
    } else if(b.type==='safety'){
      const slot = b.slotId ? findSlot('safety', b.slotId) : null;
      if(slot && slot.date>=today) events.push({ title:'Safety Training', date:slot.date, time:slot.time, icon:'shield', color:'var(--blue)' });
    } else if(b.type==='feedback'){
      const dt = getBookingDateTime(b);
      if(dt.date && dt.date>=today) events.push({ title:'Feedback Meeting', date:dt.date, time:dt.time, icon:'message', color:'var(--green)' });
    }
  });
  events.sort((a,b)=>(a.date+(a.time||'')).localeCompare(b.date+(b.time||'')));
  return events[0]||null;
}

async function handleNiteshRequestSubmit(form){
  if(!validateFormFields(form)){ showToast('กรุณาตรวจสอบข้อมูลในฟอร์มให้ครบถ้วน', 'error'); return; }
  const visitDate = form.querySelector('[name="visitDate"]').value;
  const visitTime = form.querySelector('[name="visitTime"]').value;
  const minDate = niteshMinDate();
  const dateField = form.querySelector('[name="visitDate"]').closest('.field');
  dateField.classList.remove('error');
  if(!visitDate || visitDate < minDate){
    dateField.classList.add('error');
    showToast('กรุณาจองคิวนิเทศล่วงหน้าอย่างน้อย 7 วัน', 'error');
    return;
  }
  const u = STATE.currentUser;
  const data = {
    college: form.querySelector('[name="college"]').value.trim(),
    advisorName: form.querySelector('[name="advisorName"]').value.trim(),
    advisorPhone: form.querySelector('[name="advisorPhone"]').value.trim(),
    visitDate, visitTime,
    note: form.querySelector('[name="note"]').value.trim()
  };
  if(hasConflict(u.empId, visitDate, visitTime, null)){
    showToast('คุณมีการจองในช่วงเวลานี้อยู่แล้ว กรุณาเลือกเวลาอื่น', 'error');

    type:'nitesh', slotId:null,
    studentEmpId: u.empId, studentName: u.name,

  };

  closeModal();
  openNiteshSuccessModal(booking);
}

    const dt = getBookingDateTime(b);

    if(b.status==='cancelled') computedStatus = 'cancelled';

   หมวด: ปฏิทินของฉัน (My Calendar) — สำหรับนักศึกษา
   ======================================================================= */
function eventsForDateStudent(empId, dateStr){
  const events = [];
  const u = DB.users.find(x=>x.empId===empId);
  if(u && u.startDate===dateStr) events.push({ title:'วันเริ่มฝึกงาน', time:null, detail:'', color:'var(--navy)', icon:'building' });
  const ist = internshipStatus(empId);
  if(ist.end===dateStr) events.push({ title:'วันสิ้นสุดการฝึกงาน', time:null, detail:'', color:'var(--navy)', icon:'checkCircle' });

  DB.bookings.filter(b=>b.studentEmpId===empId && b.status!=='cancelled').forEach(b=>{
    if(b.type==='nitesh'){
      const dt = getBookingDateTime(b);
      const locSuffix = b.data.meetingLocation ? ` · 📍 ${b.data.meetingLocation}` : '';
      if(dt.date===dateStr) events.push({ title:t('nitesh.label'), time:dt.time, detail:(b.data.advisorName||'')+locSuffix, color:'#C9A227', icon:TYPE_META.nitesh.icon });
    } else if(b.type==='safety'){
      const slot = b.slotId ? findSlot('safety', b.slotId) : null;
      if(slot){
        if(slot.date===dateStr) events.push({ title:'Safety Training (วันแรก)', time:slot.time, detail:'', color:'var(--blue)', icon:TYPE_META.safety.icon });
        if(slot.day2Date===dateStr) events.push({ title:'Safety Training (วันที่สอง)', time:`${slot.day2Start}-${slot.day2End}`, detail:'', color:'var(--blue)', icon:TYPE_META.safety.icon });
      }
    } else if(b.type==='feedback'){
      const dt = getBookingDateTime(b);
      if(dt.date===dateStr) events.push({ title:t('feedback.label'), time:dt.time, detail:'', color:'var(--green)', icon:TYPE_META.feedback.icon });
    }
  });

  const mKey = monthKeyOf(dateStr);
  const cfg = allowanceMonthConfig(mKey);
  if(cfg.dueDate===dateStr) events.push({ title:'กำหนดส่งใบลงเวลา', time:null, detail:monthLabelTH(mKey), color:'var(--orange)', icon:'fileText' });
  if(cfg.payDate===dateStr) events.push({ title:'วันจ่ายเบี้ยเลี้ยง', time:null, detail:monthLabelTH(mKey), color:'var(--green)', icon:'money' });

  return events;
}

function validateFormFields(form){
  let ok = true;
  form.querySelectorAll('.field[data-req="1"]').forEach(f=>{
    const input = f.querySelector('input,textarea,select');
    f.classList.remove('error');
    if(!input.value.trim()){ f.classList.add('error'); ok=false; }
  });
  form.querySelectorAll('.field[data-phone="1"]').forEach(f=>{
    const input = f.querySelector('input');
    const val = input.value.replace(/-/g,'').trim();
    if(val && !/^0[0-9]{8,9}$/.test(val)){ f.classList.add('error'); ok=false; }
  });
  return ok;
}

    'ใบยืนยันการจอง — Intern Booking System',
    '========================================',
    `ประเภทกิจกรรม : ${meta.label}`,
    `เลขที่การจอง  : ${b.bookingNo}`,
    `ผู้จอง        : ${b.studentName} (${b.studentEmpId})`,
    `วันที่         : ${dt.dateLabel}`,
    `เวลา          : ${dt.timeLabel}`,
    `สถานะ         : ${statusLabelForExport(b)}`,
    '========================================',
    'กรุณาแสดงใบยืนยันฉบับนี้ที่จุดลงทะเบียนในวันเข้าร่วมกิจกรรม'
  ];
  const blob = new Blob(['\uFEFF'+lines.join('\n')], {type:'text/plain;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download = `receipt-${b.bookingNo}.txt`;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url), 1000);
  showToast('ดาวน์โหลดใบยืนยันการจองแล้ว','success');
}

function paginate(arr, page, size){
  const totalPages = Math.max(1, Math.ceil(arr.length/size));
  const p = Math.min(Math.max(1,page), totalPages);
  return { items: arr.slice((p-1)*size, p*size), totalPages, page:p };
}
function paginationHTML(tableKey, page, totalPages){
  if(totalPages<=1) return '';
  let btns = '';
  for(let i=1;i<=totalPages;i++){
    if(totalPages>7 && Math.abs(i-page)>2 && i!==1 && i!==totalPages){ if(Math.abs(i-page)===3) btns+=`<span style="color:var(--text-faint)">…</span>`; continue; }
    btns += `<button class="${i===page?'active':''}" data-act="page" data-table="${tableKey}" data-page="${i}">${i}</button>`;
  }
  return `<div class="pagination">${btns}</div>`;
}
function statusBadgeGeneric(status){
  if(status==='completed') return `<span class="badge badge-green">เสร็จสิ้น</span>`;
  if(status==='cancelled') return `<span class="badge badge-red">ยกเลิก</span>`;
  return `<span class="badge badge-orange">กำลังจะถึง</span>`;
}
function bookingComputedStatus(b){
  if(b.status==='cancelled') return 'cancelled';
  const dt = getBookingDateTime(b);
  if(b.type==='nitesh') return (b.status==='confirmed' && dt.date && dt.date<todayISO()) ? 'completed' : 'upcoming';
  if(dt.date && dt.date < todayISO()) return 'completed';
  return 'upcoming';
}

function eventsForDate(dateStr){
  const events = [];
  (DB.sessions.safety||[]).forEach(s=>{
    if(s.date===dateStr) events.push({ type:'safety', title:'Safety Training (วันแรก)', time:s.time, detail:`${s.capacity-remainingOf('safety',s)}/${s.capacity} คน` });
    if(s.day2Date===dateStr) events.push({ type:'safety', title:'Safety Training (วันที่สอง)', time:`${s.day2Start}-${s.day2End}`, detail:`${s.capacity-remainingOf('safety',s)}/${s.capacity} คน` });
  });
  (DB.sessions.feedback||[]).forEach(s=>{
    if(s.date===dateStr) events.push({ type:'feedback', title:t('feedback.label'), time:s.time, detail:s.mentor||'' });
  });
  DB.bookings.filter(b=>b.type==='nitesh' && b.status!=='cancelled').forEach(b=>{
    const dt = getBookingDateTime(b);
    if(dt.date===dateStr) events.push({ type:'nitesh', title:t('nitesh.label'), time:dt.time, detail:b.data.advisorName||'' });
  });
  return events;
}

function renderAdminOverview(){
  const today = todayISO();
  const totalBooking = DB.bookings.length;
  const pending = DB.bookings.filter(b=>bookingComputedStatus(b)==='upcoming').length;
  const completed = DB.bookings.filter(b=>bookingComputedStatus(b)==='completed').length;
  const cancelled = DB.bookings.filter(b=>b.status==='cancelled').length;

  const typeCounts = ['nitesh','safety','feedback'].map(t=>({
    type:t, count: DB.bookings.filter(b=>b.type===t && b.status!=='cancelled').length
  }));
  const maxTypeCount = Math.max(1, ...typeCounts.map(t=>t.count));

  // month chart: last 6 months, count active bookings by their date (slot date or nitesh visit date)
  const monthMap = {};
  DB.bookings.filter(b=>b.status!=='cancelled').forEach(b=>{
    const dt = getBookingDateTime(b); if(!dt.date) return;
    const d = new Date(dt.date+'T00:00:00');
    const key = d.getFullYear()+'-'+pad(d.getMonth()+1);
    monthMap[key] = (monthMap[key]||0)+1;
  });
  const monthKeys = Object.keys(monthMap).sort().slice(-6);
  const maxMonthCount = Math.max(1, ...monthKeys.map(k=>monthMap[k]));

  const interns = DB.users.filter(u=>u.role==='intern');
  const endingSoon = interns
    .map(u=>({ u, st: internshipStatus(u.empId) }))
    .filter(x=>x.st.label==='ใกล้จบ')
    .sort((a,b)=>a.st.daysLeft-b.st.daysLeft);

  const pendingTasks = interns
    .map(u=>{
      const st = internshipStatus(u.empId);
      const hasSafety = DB.bookings.some(b=>b.type==='safety' && b.studentEmpId===u.empId && b.status!=='cancelled');
      const hasNitesh = DB.bookings.some(b=>b.type==='nitesh' && b.studentEmpId===u.empId && b.status!=='cancelled');
      const hasFeedback = DB.bookings.some(b=>b.type==='feedback' && b.studentEmpId===u.empId && b.status!=='cancelled');
      const missing = [!hasNitesh?'นิเทศอาจารย์':null, !hasSafety?'Safety':null, !hasFeedback?'Feedback':null].filter(Boolean);
      return { u, st, missing };
    })
    .filter(x=>x.st.label!=='จบแล้ว' && x.missing.length>0);

  /* ---- ส่วนที่ 1: งานที่ต้องดำเนินการวันนี้ ---- */
  const pendingNiteshApprovals = DB.bookings.filter(b=>b.type==='nitesh' && b.status==='pending').length;
  const safetyToday = DB.sessions.safety.filter(s=> s.date===today || s.day2Date===today);
  const feedbackToday = DB.sessions.feedback.filter(s=> s.date===today);
  const todaysTasks = [
    { label:'รออนุมัตินิเทศอาจารย์', count:pendingNiteshApprovals, adminview:'nitesh', icon:'calendar', color:'var(--orange)' },
    { label:'Safety วันนี้', count:safetyToday.length, adminview:'safety', icon:'shield', color:'var(--red)' },

  /* ---- ส่วนที่ 3: Safety Summary ---- */

    const hasCompleted = DB.bookings.some(b=>b.type==='safety' && b.studentEmpId===u.empId && bookingComputedStatus(b)==='completed');
    const hasUpcoming = DB.bookings.some(b=>b.type==='safety' && b.studentEmpId===u.empId && bookingComputedStatus(b)==='upcoming');
    return !hasCompleted && hasUpcoming;
  }).length;
  const safetyNotBooked = Math.max(0, interns.length - safetyTrained - safetyBookedOnly);
  const safetyPct = interns.length ? Math.round(safetyTrained/interns.length*100) : 0;

  /* ---- Allowance / Timesheet Summary (เดือนปัจจุบัน) ---- */
  const curMonthKey = today.slice(0,7);
  const tsCounts = { not_submitted:0, submitted:0, verified:0, paid:0, incomplete:0 };
  interns.forEach(u=>{ tsCounts[getTimesheetStatus(u.empId, curMonthKey)]++; });

  /* ---- ส่วนที่ 5: กิจกรรมที่กำลังจะมาถึง ---- */
  const upcomingEvents = [];
  DB.sessions.safety.forEach(s=>{
    if(s.date>=today && s.isOpen) upcomingEvents.push({ date:s.date, time:s.time, type:'safety', title:'Safety Training', detail:`${s.capacity-remainingOf('safety',s)}/${s.capacity} คน` });

  DB.sessions.feedback.forEach(s=>{
    if(s.date>=today && s.isOpen) upcomingEvents.push({ date:s.date, time:s.time, type:'feedback', title:t('feedback.label'), detail:s.mentor||'' });

  DB.bookings.filter(b=>b.type==='nitesh' && b.status!=='cancelled').forEach(b=>{
    const dt = getBookingDateTime(b);
    if(dt.date && dt.date>=today) upcomingEvents.push({ date:dt.date, time:dt.time, type:'nitesh', title:t('nitesh.label'), detail:b.data.advisorName||'' });
  });
  upcomingEvents.sort((a,b)=> (a.date+(a.time||'')).localeCompare(b.date+(b.time||'')));
  const nextEvents = upcomingEvents.slice(0,6);

  return `
    <div class="hero">
      <div class="eyebrow">ADMIN DASHBOARD</div>
      <h1>ภาพรวมระบบจอง</h1>
      <p>สรุปข้อมูลการจองทั้งหมดในระบบ Intern Booking System</p>
    </div>

    <div class="panel" style="margin-bottom:16px;">
      <h4 style="font-family:'Prompt'; font-size:14.5px; margin:0 0 14px; font-weight:600; display:flex; align-items:center; gap:7px;">${ICON('checkCircle',16)} งานที่ต้องดำเนินการวันนี้</h4>
      <div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(150px,1fr)); gap:10px;">
        ${todaysTasks.map(x=>`
          <button data-act="nav-admin" data-adminview="${x.adminview}" style="text-align:left; background:var(--bg); border:1px solid var(--border); border-radius:12px; padding:12px 14px; display:flex; flex-direction:column; gap:6px;">
            <span style="color:${x.color}">${ICON(x.icon,16)}</span>
            <span style="font-family:'Prompt'; font-size:20px; font-weight:700; color:${x.count>0?x.color:'var(--text)'};">${x.count}</span>
            <span style="font-size:11.5px; color:var(--text-muted);">${x.label}</span>
          </button>`).join('')}
      </div>
    </div>

    ${renderCalendarWidget()}

    <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:16px;">
      <div class="panel">
        <h4 style="font-family:'Prompt'; font-size:14.5px; margin:0 0 14px; font-weight:600; display:flex; align-items:center; gap:7px;">${ICON('shield',15)} Safety Summary</h4>
        <div style="display:flex; justify-content:space-between; align-items:baseline; margin-bottom:8px;">
          <span style="font-size:12.5px; color:var(--text-muted);">อบรมแล้ว</span>
          <span class="mono" style="font-size:15px; font-weight:700;">${safetyTrained} / ${interns.length} คน</span>
        </div>
        <div class="b-track" style="height:10px; margin-bottom:14px;"><div class="b-fill" style="width:${safetyPct}%; background:var(--green);"></div></div>
        <div style="display:flex; gap:16px; flex-wrap:wrap; font-size:12px; color:var(--text-muted);">
          <button data-act="nav-admin" data-adminview="safety" style="display:flex; align-items:center; gap:6px;"><span class="badge badge-green">${safetyTrained}</span> อบรมแล้ว</button>
          <button data-act="nav-admin" data-adminview="safety" style="display:flex; align-items:center; gap:6px;"><span class="badge badge-orange">${safetyBookedOnly}</span> จองแล้ว (รออบรม)</button>
          <button data-act="nav-admin" data-adminview="users" style="display:flex; align-items:center; gap:6px;"><span class="badge badge-red">${safetyNotBooked}</span> ยังไม่ได้จอง</button>

        ${pendingTasks.length===0 ? `<div style="font-size:12.5px; color:var(--text-faint);">ทุกคนจองครบตามที่กำหนดแล้ว</div>` :
          pendingTasks.slice(0,5).map(x=>`

        ${pendingTasks.length>5 ? `<div style="font-size:11.5px; color:var(--text-faint); margin-top:8px;">และอีก ${pendingTasks.length-5} คน</div>` : ''}

      ${nextEvents.length===0 ? `<div style="font-size:12.5px; color:var(--text-faint);">ไม่มีกิจกรรมที่กำลังจะมาถึง</div>` :

      <div class="stat-card"><div class="stat-top"><div class="stat-icon" style="background:var(--green-bg); color:var(--green)">${ICON('checkCircle',17)}</div></div><div class="stat-val">${completed}</div><div class="stat-label">Completed</div></div>

    <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">

function renderAdminType(type){
  const meta = TYPE_META[type];
  const slots = [...(DB.sessions[type]||[])].sort((a,b)=>(a.date+a.time).localeCompare(b.date+b.time));
  const subTab = STATE.adminTab[type];

  return `
    <div class="section-head">
      <div class="section-title">
        <div class="sicon" style="background:${meta.bg}; color:${meta.color}">${ICON(meta.icon,19)}</div>
        <div><h2>จัดการ${meta.label}</h2><div class="ssub">${meta.labelEn.toUpperCase()}</div></div>
      </div>
      ${subTab==='slots' ? `<button class="btn btn-gold btn-sm" data-act="admin-add-slot" data-type="${type}">${ICON('plus',14)} เพิ่มรอบใหม่</button>` : ''}
    </div>
    <div class="tabbar">
      <button data-act="admintab" data-type="${type}" data-subtab="slots" class="${subTab==='slots'?'active':''}">รอบเวลา (${slots.length})</button>
      <button data-act="admintab" data-type="${type}" data-subtab="bookings" class="${subTab==='bookings'?'active':''}">รายชื่อผู้จอง (${DB.bookings.filter(b=>b.type===type).length})</button>
    </div>
    ${subTab==='slots' ? renderAdminSlotList(type, slots) : renderAdminBookingsTable(type)}
  `;
}
function renderAdminSlotList(type, slots){
  if(slots.length===0) return emptyState('calendar','ยังไม่มีรอบ กด "เพิ่มรอบใหม่" เพื่อเริ่มต้น');
  return slots.map(s=>{
    const remaining = remainingOf(type,s);
    const badge = type==='safety' ? safetyStatusBadge(s) : slotStatusBadge(type,s);
    const db_ = type==='safety' ? safetyDateBlock(s) : dateBlock(s.date);
    const timeLine = type==='safety' ? safetyTimeLabel(s) : `${s.time} น. ${s.month?`· ${s.month}`:''}`;
    const dateLine = type==='safety' ? `${safetyDateRangeLabel(s)} (${safetyDayLabel(s)})` : null;
    return `
    <div class="slot-card">
      <div class="slot-info">
        <div class="slot-date-block"><div class="d">${db_.d}</div><div class="m">${db_.m}</div></div>
        <div class="slot-meta">
          ${dateLine ? `<div class="stime" style="font-size:12.5px; color:var(--text-muted); margin-bottom:2px;">${ICON('calendar',12)} ${dateLine}</div>` : ''}
          <div class="stime">${ICON('clock',13)} ${timeLine}</div>
          <div class="ssub">${s.mentor?`${ICON('user',12)} ${s.mentor} `:''}${ICON('users',12)} รับ ${s.capacity} คน · จองแล้ว ${s.capacity-remaining} คน</div>
        </div>
      </div>
      <div style="display:flex; align-items:center; gap:8px; flex-wrap:wrap;">
        <span class="badge ${badge.cls}">${badge.text}</span>
        <button class="btn btn-outline btn-sm" data-act="admin-toggle-open" data-type="${type}" data-id="${s.id}">${s.isOpen?'ปิดรับจอง':'เปิดรับจอง'}</button>
        <button class="btn btn-ghost btn-sm btn-icon" data-act="admin-edit-slot" data-type="${type}" data-id="${s.id}">${ICON('edit',15)}</button>
        <button class="btn btn-ghost btn-sm btn-icon" style="color:var(--red)" data-act="admin-delete-slot" data-type="${type}" data-id="${s.id}">${ICON('trash',15)}</button>
      </div>
    </div>`;
  }).join('');
}

function bookingRowsForType(type){
  const search = (STATE.search[type]||'').toLowerCase();
  const statusF = STATE.statusFilter[type]||'all';
  let rows = DB.bookings.filter(b=>b.type===type).map(b=>({...b, dt:getBookingDateTime(b), computed:bookingComputedStatus(b)}));
  if(search) rows = rows.filter(r=> r.studentName.toLowerCase().includes(search) || r.studentEmpId.toLowerCase().includes(search) || r.bookingNo.toLowerCase().includes(search));
  if(statusF!=='all') rows = rows.filter(r=>r.computed===statusF);
  rows.sort((a,b)=>(b.dt.date||'').localeCompare(a.dt.date||''));
  return rows;
}
function renderAdminBookingsTable(type){

                <button class="btn btn-ghost btn-sm btn-icon" style="color:var(--green)" data-act="approve-booking" data-id="${r.id}" title="ทำเครื่องหมายเสร็จสิ้น">${ICON('check',14)}</button>

/* ---- Admin: นิเทศอาจารย์ (คำขอ ไม่มีรอบเวลา) ---- */
function bookingRowsForNitesh(){
  const search = (STATE.search.nitesh||'').toLowerCase();
  const statusF = STATE.statusFilter.nitesh||'all'; // all / pending / confirmed / cancelled
  let rows = DB.bookings.filter(b=>b.type==='nitesh').map(b=>({...b, dt:getBookingDateTime(b)}));
  if(search) rows = rows.filter(r=> r.studentName.toLowerCase().includes(search) || r.studentEmpId.toLowerCase().includes(search) || r.bookingNo.toLowerCase().includes(search) || (r.data.advisorName||'').toLowerCase().includes(search));
  if(statusF!=='all') rows = rows.filter(r=>r.status===statusF);
  rows.sort((a,b)=>(b.dt.date||'').localeCompare(a.dt.date||''));
  return rows;
}
function renderAdminNitesh(){
  const meta = TYPE_META.nitesh;

async function handleUpdateInternshipMonths(form){

async function handleAddLeaveEntry(form){
  const empId = form.dataset.empid;
  const date = form.querySelector('[name="date"]').value;
  if(!date){ showToast('กรุณาเลือกวันที่', 'error'); return; }
  const type = form.querySelector('[name="type"]').value;
  const days = Math.max(0.5, Number(form.querySelector('[name="days"]').value)||1);
  const exempt = form.querySelector('[name="exempt"]').checked;
  const note = form.querySelector('[name="note"]').value.trim();
  if(!DB.leaveBalances[empId]) DB.leaveBalances[empId] = { internshipMonths:0, entries:[] };
  DB.leaveBalances[empId].entries.push({ id:uid('lv'), date, type, days, exempt, note });
  await persist();
  showToast('เพิ่มรายการลาแล้ว', 'success');
  openLeaveDetailModal(empId);
  renderMain();
}
async function doDeleteLeaveEntry(empId, entryId){
  if(!DB.leaveBalances[empId]) return;
  DB.leaveBalances[empId].entries = DB.leaveBalances[empId].entries.filter(e=>e.id!==entryId);
  await persist();
  showToast('ลบรายการลาแล้ว', 'success');
  openLeaveDetailModal(empId);
  renderMain();
}

const USERS_SORT_COLUMNS = {
  name:  u => u.name || '',
  empId: u => u.empId || '',
  college: u => u.college || '',
  department: u => u.department || '',
  startDate: u => u.startDate || '',
  daysLeft: u => { const d = internshipStatus(u.empId).daysLeft; return d===null?999999:d; }
};
function sortUsers(rows){
  const { key, dir } = STATE.usersSort;
  const getter = USERS_SORT_COLUMNS[key] || USERS_SORT_COLUMNS.name;
  const sorted = [...rows].sort((a,b)=>{
    const va = getter(a), vb = getter(b);
    if(typeof va==='number' && typeof vb==='number') return va-vb;
    return String(va).localeCompare(String(vb), 'th');
  });
  if(dir==='desc') sorted.reverse();
  return sorted;
}
function sortHeaderBtn(key, label){
  const active = STATE.usersSort.key===key;
  const arrow = active ? (STATE.usersSort.dir==='asc'?' ▲':' ▼') : '';
  return `<button data-act="sort-users" data-key="${key}" style="font-weight:${active?700:600}; color:${active?'var(--navy)':'inherit'};">${label}${arrow}</button>`;
}

function exportInternListCSV(rows){
  const data = internListExportRows(rows);
  if(data.length===0){ showToast('ไม่มีข้อมูลให้ export', 'error'); return; }
  const headers = Object.keys(data[0]);

  const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `intern-list-${todayISO()}.csv`;

/* อ่านไฟล์รูปที่เลือกจากเครื่อง ย่อเป็นสี่เหลี่ยมจัตุรัสขนาดเล็ก แล้วแปลงเป็น data URL เก็บลงช่อง hidden */
function handlePhotoFileSelect(input, hiddenId, previewId, fallbackId){
  const file = input.files && input.files[0];
  if(!file) return;
  if(!file.type.startsWith('image/')){ showToast('กรุณาเลือกไฟล์รูปภาพเท่านั้น', 'error'); return; }
  const reader = new FileReader();
  reader.onload = function(e){
    const img = new Image();
    img.onload = function(){
      const size = 200;
      const canvas = document.createElement('canvas');
      canvas.width = size; canvas.height = size;
      const ctx = canvas.getContext('2d');
      const scale = Math.max(size/img.width, size/img.height);
      const w = img.width*scale, h = img.height*scale;
      ctx.drawImage(img, (size-w)/2, (size-h)/2, w, h);
      const dataUrl = canvas.toDataURL('image/jpeg', 0.75);
      const hidden = document.getElementById(hiddenId);
      if(hidden) hidden.value = dataUrl;
      const preview = document.getElementById(previewId);
      if(preview){ preview.src = dataUrl; preview.style.display = 'block'; }
      const fallback = document.getElementById(fallbackId);
      if(fallback) fallback.style.display = 'none';
    };
    img.onerror = function(){ showToast('ไม่สามารถอ่านไฟล์รูปนี้ได้', 'error'); };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

async function handleInternProfileSubmit(form){
  if(!validateFormFields(form)){ showToast('กรุณากรอกข้อมูลให้ครบถ้วน', 'error'); return; }
  const origEmpId = form.dataset.empid;
  const isNew = !origEmpId;
  const empIdField = form.querySelector('[name="empId"]');
  const newEmpId = empIdField.value.trim();
  const name = form.querySelector('[name="name"]').value.trim();
  const password = form.querySelector('[name="password"]').value.trim();
  const college = form.querySelector('[name="college"]').value.trim();
  const faculty = form.querySelector('[name="faculty"]').value.trim();
  const department = form.querySelector('[name="department"]').value.trim();
  const phone = form.querySelector('[name="phone"]').value.trim();
  const startDate = form.querySelector('[name="startDate"]').value;
  const months = Math.max(0, Number(form.querySelector('[name="months"]').value)||0);
  const photoUrl = form.querySelector('[name="photoUrl"]').value.trim();

  if(isNew){
    if(!newEmpId || DB.users.some(u=>u.empId===newEmpId)){
      empIdField.closest('.field').classList.add('error');
      showToast('รหัสพนักงานนี้ถูกใช้แล้ว หรือยังไม่ได้กรอก', 'error');
      return;
    }
    if(!password){ showToast('กรุณาตั้งรหัสผ่าน', 'error'); return; }
    DB.users.push({ empId:newEmpId, password, name, role:'intern', college, faculty, department, phone, startDate, photoUrl });
  } else {
    const u = DB.users.find(x=>x.empId===origEmpId);
    if(u){
      u.name=name; u.college=college; u.faculty=faculty; u.department=department; u.phone=phone; u.startDate=startDate; u.photoUrl=photoUrl;
      if(password) u.password = password;
    }
  }
  const finalEmpId = isNew ? newEmpId : origEmpId;
  if(!DB.leaveBalances[finalEmpId]) DB.leaveBalances[finalEmpId] = { internshipMonths:0, entries:[] };
  DB.leaveBalances[finalEmpId].internshipMonths = months;

  await persist();
  closeModal();
  showToast(isNew?'เพิ่มนักศึกษาใหม่แล้ว':'บันทึกข้อมูลนักศึกษาแล้ว', 'success');
  renderMain();
}

async function handleSlotFormSubmit(form){
  if(!validateFormFields(form)){ showToast('กรุณากรอกข้อมูลให้ครบถ้วน', 'error'); return; }
  const type = form.dataset.type;
  const id = form.dataset.id;
  const date = form.querySelector('[name="date"]').value;
  const timeStart = form.querySelector('[name="timeStart"]').value;
  const timeEnd = form.querySelector('[name="timeEnd"]').value;
  if(!timeStart || !timeEnd){ showToast('กรุณาระบุเวลาให้ครบถ้วน', 'error'); return; }
  const capacity = Number(form.querySelector('[name="capacity"]').value)||1;
  const isOpen = form.querySelector('[name="isOpen"]').value==='1';
  const slotObj = { date, time:`${timeStart}-${timeEnd}`, capacity, isOpen };
  const mentorInput = form.querySelector('[name="mentor"]');
  const mentorPhoneInput = form.querySelector('[name="mentorPhone"]');
  const monthInput = form.querySelector('[name="month"]');
  if(mentorInput) slotObj.mentor = mentorInput.value.trim();
  if(mentorPhoneInput) slotObj.mentorPhone = mentorPhoneInput.value.trim();
  if(monthInput) slotObj.month = monthInput.value.trim();
  if(type==='safety'){
    const day2Date = form.querySelector('[name="day2Date"]')?.value || '';
    const day2TimeStart = form.querySelector('[name="day2TimeStart"]')?.value || '';
    const day2TimeEnd = form.querySelector('[name="day2TimeEnd"]')?.value || '';
    slotObj.day2Date = day2Date;
    slotObj.day2Start = day2TimeStart;
    slotObj.day2End = day2TimeEnd;
  }

  if(id){
    const idx = DB.sessions[type].findIndex(s=>s.id===id);
    if(idx>-1){
      const oldSlot = DB.sessions[type][idx];
      const dateOrTimeChanged = oldSlot.date!==slotObj.date || oldSlot.time!==slotObj.time || (type==='safety' && oldSlot.day2Date!==slotObj.day2Date);
      DB.sessions[type][idx] = { ...oldSlot, ...slotObj };
      if(dateOrTimeChanged){
        DB.bookings.filter(b=>b.type===type && b.slotId===id && b.status!=='cancelled').forEach(b=>{
          addNotification({ audience:b.studentEmpId, icon:'alert', color:'var(--orange)', title:`${TYPE_META[type].label}มีการเปลี่ยนแปลงกำหนดการ`, detail:'กรุณาตรวจสอบวันเวลาใหม่ในหน้าการจองของฉัน', link:{role:'student', view:'mybookings'} });
        });
      }
    }
    showToast('แก้ไขรอบเรียบร้อยแล้ว', 'success');
  } else {
    DB.sessions[type].push({ id: uid(type.slice(0,2)), ...slotObj });
    showToast('เพิ่มรอบใหม่เรียบร้อยแล้ว', 'success');
  }
  await persist();
  closeModal();
  renderMain();
}
