function bookingsToExportRows(type){
  const rows = type==='all' ? reportRows() : type==='nitesh' ? bookingRowsForNitesh() : bookingRowsForType(type);
  return rows.map(r=>({
    'ประเภท': TYPE_META[r.type].label,
    'เลขที่การจอง': r.bookingNo,
    'ชื่อผู้จอง': r.studentName,
    'รหัสพนักงาน': r.studentEmpId,
    'วันที่': r.dt?.dateLabel||'',
    'เวลา': r.dt?.timeLabel||'',
    'สถานะ': statusLabelForExport(r)
  }));
}
function exportCSV(type){
  const rows = bookingsToExportRows(type);
  if(rows.length===0){ showToast('ไม่มีข้อมูลให้ export', 'error'); return; }
  const headers = Object.keys(rows[0]);
  const csv = [headers.join(','), ...rows.map(r=>headers.map(h=>`"${String(r[h]).replace(/"/g,'""')}"`).join(','))].join('\n');
  const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `bookings-${type}-${todayISO()}.csv`;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url), 1000);
  showToast('Export CSV สำเร็จ', 'success');
}
function exportXLSX(type){
  const rows = bookingsToExportRows(type);
  if(rows.length===0){ showToast('ไม่มีข้อมูลให้ export', 'error'); return; }
  if(typeof XLSX==='undefined'){ showToast('ไม่พบไลบรารี Excel กรุณาลองใหม่', 'error'); return; }
  const ws = XLSX.utils.json_to_sheet(rows);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Bookings');
  XLSX.writeFile(wb, `bookings-${type}-${todayISO()}.xlsx`);
  showToast('Export Excel สำเร็จ', 'success');
}

/* ---- Export Excel รวมทุกโมดูล (นิเทศ/Safety/Feedback/วันลา/ผู้ใช้งาน) ---- */
function exportAllModulesExcel(){
  if(typeof XLSX==='undefined'){ showToast('ไม่พบไลบรารี Excel กรุณาลองใหม่', 'error'); return; }
  const wb = XLSX.utils.book_new();

  const niteshRows = bookingRowsForNitesh().map(r=>({
    'เลขที่คำขอ': r.bookingNo, 'ชื่อนักศึกษา': r.studentName, 'รหัส': r.studentEmpId,
    'อาจารย์นิเทศ': r.data.advisorName||'', 'วันที่': r.dt.dateLabel||'', 'เวลา': r.dt.timeLabel||'',
    'สถานะ': statusLabelForExport(r)
  }));
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(niteshRows.length?niteshRows:[{'ข้อมูล':'ไม่มีคำขอ'}]), 'นิเทศอาจารย์');

  ['safety','feedback'].forEach(type=>{
    const rows = bookingRowsForType(type).map(r=>({
      'เลขที่จอง': r.bookingNo, 'ชื่อผู้จอง': r.studentName, 'รหัส': r.studentEmpId,
      'วันที่': r.dt.dateLabel||'', 'เวลา': r.dt.timeLabel||'', 'สถานะ': statusLabelForExport(r)
    }));
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(rows.length?rows:[{'ข้อมูล':'ไม่มีรายการ'}]), TYPE_META[type].label);
  });

  const leaveRows = [];
  DB.users.filter(u=>u.role==='intern').forEach(u=>{
    leaveEntriesFor(u.empId).forEach(e=>{
      leaveRows.push({
        'ชื่อ': u.name, 'รหัส': u.empId, 'วันที่': formatDateMid(e.date), 'ประเภท': LEAVE_ENTRY_TYPE_LABELS[e.type]||e.type,
        'จำนวนวัน': e.days, 'หักโควตา': e.exempt?'ไม่หัก':'หัก', 'หมายเหตุ': e.note||''
      });
    });
  });
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(leaveRows.length?leaveRows:[{'ข้อมูล':'ไม่มีประวัติการลา'}]), 'วันลา');

  const userRows = DB.users.filter(u=>u.role==='intern').map(u=>{
    const st = internshipStatus(u.empId);
    const granted = leaveGrantedDays(u.empId), used = leaveUsedDays(u.empId);
    return {
      'ชื่อ-นามสกุล': u.name, 'รหัส': u.empId, 'สถาบัน': u.college||'', 'แผนก': u.department||'',
      'เริ่มฝึกงาน': u.startDate?formatDateMid(u.startDate):'', 'สิ้นสุด(ประมาณ)': st.end?formatDateMid(st.end):'',
      'สถานะฝึกงาน': st.label, 'วันลาได้รับ': granted, 'วันลาใช้ไป': used, 'วันลาคงเหลือ': Math.max(0,granted-used)
    };
  });
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(userRows), 'ผู้ใช้งาน');

  XLSX.writeFile(wb, `intern-booking-summary-${todayISO()}.xlsx`);
  showToast('Export Excel รวมทุกโมดูลสำเร็จ', 'success');
}

/* =======================================================================
   หมวด 19: Action helpers (สถานะ / ลบ / รีเซ็ต)
   ======================================================================= */
async function doCancelBooking(id){
  const b = findBooking(id); if(!b) return;
  b.status = 'cancelled';
  await persist();
  closeModal();
  showToast('ยกเลิกการจองแล้ว ที่นั่งถูกปล่อยว่างแล้ว', 'success');
  renderMain();
}
async function doDeleteSlot(type, id){
  const affected = DB.bookings.filter(b=>b.type===type && b.slotId===id && b.status!=='cancelled');
  affected.forEach(b=>{
    b.status = 'cancelled';
    addNotification({ audience:b.studentEmpId, icon:'xCircle', color:'var(--red)', title:`รอบ${TYPE_META[type].label}ที่คุณจองถูกยกเลิก`, detail:'กรุณาเลือกรอบใหม่ หรือติดต่อ HR', link:{role:'student', view:'mybookings'} });
  });
  DB.sessions[type] = DB.sessions[type].filter(s=>s.id!==id);
  await persist();
  closeModal();
  showToast('ลบรอบเวลาแล้ว', 'success');
  renderMain();
}
async function doToggleOpen(type, id){
  const s = findSlot(type, id); if(!s) return;
  s.isOpen = !s.isOpen;
  await persist();
  renderMain();
  showToast(s.isOpen ? 'เปิดรับจองรอบนี้แล้ว' : 'ปิดรับจองรอบนี้แล้ว', 'success');
}
async function doApproveBooking(id){
  const b = findBooking(id); if(!b) return;
  b.status = b.type==='nitesh' ? 'confirmed' : 'completed';
  const dt = getBookingDateTime(b);
  if(b.type==='nitesh'){
    const locText = b.data.meetingLocation ? ` · 📍 ${b.data.meetingLocation}` : '';
    addNotification({ audience:b.studentEmpId, icon:'checkCircle', color:'var(--green)', title:'คำขอนิเทศอาจารย์ได้รับการอนุมัติ', detail:`วันที่ ${dt.date?formatDateMid(dt.date):'-'} เวลา ${dt.time||'-'} น.${locText}`, link:{role:'student', view:'mybookings'} });
  }
  await persist();
  closeModal();
  showToast(b.type==='nitesh' ? 'ยืนยันคำขอนิเทศแล้ว' : 'อนุมัติ / ทำเครื่องหมายเสร็จสิ้นแล้ว', 'success');
  renderMain();
}
async function changeMeetingLocation(id, location){
  const b = findBooking(id); if(!b) return;
  const oldLocation = b.data.meetingLocation || '';
  if(oldLocation === location) return;
  b.data.meetingLocation = location;
  if(b.status==='confirmed' && oldLocation && location){
    addNotification({ audience:b.studentEmpId, icon:'alert', color:'var(--orange)', title:'มีการเปลี่ยนสถานที่ประชุม', detail:`จาก ${oldLocation} เป็น ${location} — กรุณาตรวจสอบรายละเอียดก่อนเข้าร่วมการนิเทศ`, link:{role:'student', view:'mybookings'} });
  }
  await persist();
  showToast('บันทึกสถานที่ประชุมแล้ว', 'success');
}
async function doRejectBooking(id){
  const b = findBooking(id); if(!b) return;
  b.status = 'cancelled';
  const meta = TYPE_META[b.type];
  addNotification({ audience:b.studentEmpId, icon:'xCircle', color:'var(--red)', title:`${meta.label}ของคุณถูกยกเลิกโดย HR`, detail:'กรุณาติดต่อ HR หากมีข้อสงสัย', link:{role:'student', view:'mybookings'} });
  await persist();
  closeModal();
  showToast('ปฏิเสธ/ยกเลิกการจองแล้ว', 'success');
  renderMain();
}
async function doDeleteBookingRecord(id){
  DB.bookings = DB.bookings.filter(b=>b.id!==id);
  await persist();
  closeModal();
  showToast('ลบรายการแล้ว', 'success');
  renderMain();
}
async function doResetData(){
  seedData();
  await persist();
  closeModal();
  showToast('รีเซ็ตข้อมูลกลับสู่ค่าเริ่มต้นเรียบร้อยแล้ว', 'success');
  renderRoot();
}
async function handleEditBookingSubmit(form){
  const id = form.dataset.id;
  const b = findBooking(id); if(!b) return;
  const phone = form.querySelector('[name="phoneEdit"]').value.trim();
  const note = form.querySelector('[name="noteEdit"]').value.trim();
  if(b.data.advisorPhone!==undefined) b.data.advisorPhone = phone;
  else if(b.data.phone!==undefined) b.data.phone = phone;
  else b.data.phone = phone;
  b.data.note = note;
  await persist();
  closeModal();
  showToast('บันทึกการแก้ไขเรียบร้อยแล้ว', 'success');
  renderMain();
}

/* =======================================================================
   หมวด 20: Event Delegation (Click / Submit / Input / Change)
   ======================================================================= */
async function onDocumentClick(e){
  const el = e.target.closest('[data-act]');
  if(!el) return;
  const act = el.dataset.act;

  switch(act){
    case 'nav':
      STATE.view = el.dataset.view;
      if(el.dataset.view==='mybookings') STATE.myBookingsTab = STATE.myBookingsTab||'upcoming';
      STATE.notifOpen = false;
      renderTopbar();
      renderMain(); window.scrollTo(0,0); break;
    case 'nav-admin':
      STATE.adminView = el.dataset.adminview;
      STATE.sidebarOpen = false;
      STATE.notifOpen = false;
      renderTopbar(); renderSidebar(); renderMain(); window.scrollTo(0,0); break;
    case 'toggle-notif':
      STATE.notifOpen = !STATE.notifOpen;
      renderTopbar(); break;
    case 'open-notification': await openNotification(el.dataset.id); break;
    case 'delete-notification': await deleteNotificationRecord(el.dataset.id); break;
    case 'clear-all-notifs': await clearAllNotificationsForCurrentUser(); break;
    case 'calendar-nav': {
      const monthKey = STATE.calendarMonth || todayISO().slice(0,7);
      const [cy,cm] = monthKey.split('-').map(Number);
      const d = new Date(cy, cm-1, 1);
      d.setMonth(d.getMonth() + (el.dataset.dir==='next'?1:-1));
      STATE.calendarMonth = `${d.getFullYear()}-${pad(d.getMonth()+1)}`;
      renderMain();
      break;
    }
    case 'calendar-day': STATE.calendarSelectedDate = el.dataset.date; renderMain(); break;
    case 'student-calendar-day': STATE.studentCalendarSelectedDate = el.dataset.date; renderMain(); break;
    case 'student-calendar-nav': {
      const monthKey = STATE.studentCalendarMonth || todayISO().slice(0,7);
      const [cy,cm] = monthKey.split('-').map(Number);
      const d = new Date(cy, cm-1, 1);
      d.setMonth(d.getMonth() + (el.dataset.dir==='next'?1:-1));
      STATE.studentCalendarMonth = `${d.getFullYear()}-${pad(d.getMonth()+1)}`;
      renderMain();
      break;
    }
    case 'allowance-month-nav': {
      const monthKey = STATE.allowanceMonth || todayISO().slice(0,7);
      const [cy,cm] = monthKey.split('-').map(Number);
      const d = new Date(cy, cm-1, 1);
      d.setMonth(d.getMonth() + (el.dataset.dir==='next'?1:-1));
      STATE.allowanceMonth = `${d.getFullYear()}-${pad(d.getMonth()+1)}`;
      renderMain();
      break;
    }
    case 'toggle-dark':
      document.documentElement.classList.toggle('dark');
      renderTopbar(); renderMain(); break;
    case 'toggle-sidebar':
      STATE.sidebarOpen = !STATE.sidebarOpen; renderSidebar(); break;
    case 'logout': await doLogout(); break;
    case 'login-role': STATE.loginRole = el.dataset.role; renderLogin(); break;
    case 'open-book':
      if(el.hasAttribute('disabled')) return;
      openBookingModal(el.dataset.type, el.dataset.slot); break;
    case 'open-nitesh-request': openNiteshRequestModal(); break;
    case 'close-modal': closeModal(); break;
    case 'close-modal-refresh': closeModal(); renderMain(); break;
    case 'overlay-close': if(e.target===el) closeModal(); break;
    case 'tab': STATE.myBookingsTab = el.dataset.tab; renderMain(); break;
    case 'view-booking': openViewBookingModal(el.dataset.id); break;
    case 'cancel-booking':
      openConfirm({ title:'ยกเลิกการจอง', message:'คุณต้องการยกเลิกการจองนี้ใช่หรือไม่? เมื่อยกเลิกแล้วที่นั่งจะถูกปล่อยว่างทันที', danger:true, icon:'x', act:'do-cancel-booking', data:{id:el.dataset.id}, confirmLabel:'ยกเลิกการจอง' });
      break;
    case 'do-cancel-booking': await doCancelBooking(el.dataset.id); break;
    case 'download-receipt': downloadReceipt(el.dataset.id); break;
    case 'admintab': STATE.adminTab[el.dataset.type] = el.dataset.subtab; renderMain(); break;
    case 'admin-add-slot': openSlotFormModal(el.dataset.type, null); break;
    case 'admin-edit-slot': openSlotFormModal(el.dataset.type, el.dataset.id); break;
    case 'admin-edit-leave': openLeaveDetailModal(el.dataset.empid); break;
    case 'add-safety-history': openAddSafetyHistoryModal(el.dataset.empid); break;
    case 'delete-leave-entry': await doDeleteLeaveEntry(el.dataset.empid, el.dataset.entryid); break;
    case 'view-profile':
      STATE.adminProfileEmpId = el.dataset.empid;
      STATE.adminView = 'profile';
      renderSidebar(); renderMain(); window.scrollTo(0,0);
      break;
    case 'add-intern': openInternFormModal(null); break;
    case 'sort-users': {
      const key = el.dataset.key;
      if(STATE.usersSort.key===key) STATE.usersSort.dir = STATE.usersSort.dir==='asc'?'desc':'asc';
      else STATE.usersSort = { key, dir:'asc' };
      renderMain(); break;
    }
    case 'export-intern-csv': {
      let rows = DB.users.filter(u=>u.role==='intern');
      const s = (STATE.search.users||'').toLowerCase();
      if(s) rows = rows.filter(u=>u.name.toLowerCase().includes(s) || u.empId.toLowerCase().includes(s) || (u.college||'').toLowerCase().includes(s) || (u.department||'').toLowerCase().includes(s));
      exportInternListCSV(sortUsers(rows));
      break;
    }
    case 'export-intern-xlsx': {
      let rows = DB.users.filter(u=>u.role==='intern');
      const s = (STATE.search.users||'').toLowerCase();
      if(s) rows = rows.filter(u=>u.name.toLowerCase().includes(s) || u.empId.toLowerCase().includes(s) || (u.college||'').toLowerCase().includes(s) || (u.department||'').toLowerCase().includes(s));
      exportInternListXLSX(sortUsers(rows));
      break;
    }
    case 'edit-intern': openInternFormModal(el.dataset.empid); break;
    case 'delete-intern':
      openConfirm({ title:'ลบนักศึกษาออกจากระบบ', message:'ประวัติการจอง/วันลาที่เคยมีจะยังคงอยู่ (แสดงชื่อเดิม) แต่บัญชีนี้จะเข้าสู่ระบบไม่ได้อีก ต้องการดำเนินการต่อหรือไม่?', danger:true, icon:'trash', act:'do-delete-intern', data:{empid:el.dataset.empid}, confirmLabel:'ลบนักศึกษา' });
      break;
    case 'do-delete-intern': await doDeleteIntern(el.dataset.empid); break;
    case 'export-all-excel': exportAllModulesExcel(); break;
    case 'admin-delete-slot':
      openConfirm({ title:'ลบรอบเวลานี้', message:'การลบรอบจะทำให้ไม่แสดงในหน้าจองอีกต่อไป ต้องการลบหรือไม่?', danger:true, icon:'trash', act:'do-delete-slot', data:{type:el.dataset.type, id:el.dataset.id}, confirmLabel:'ลบรอบ' });
      break;
    case 'do-delete-slot': await doDeleteSlot(el.dataset.type, el.dataset.id); break;
    case 'admin-toggle-open': await doToggleOpen(el.dataset.type, el.dataset.id); break;
    case 'approve-booking': await doApproveBooking(el.dataset.id); break;
    case 'reject-booking':
      openConfirm({ title:'ปฏิเสธ/ยกเลิกการจอง', message:'ต้องการยกเลิกการจองของผู้ใช้งานนี้ใช่หรือไม่?', danger:true, icon:'x', act:'do-reject-booking', data:{id:el.dataset.id}, confirmLabel:'ยืนยันยกเลิก' });
      break;
    case 'do-reject-booking': await doRejectBooking(el.dataset.id); break;
    case 'delete-booking-record':
      openConfirm({ title:'ลบรายการนี้ถาวร', message:'ข้อมูลรายการนี้จะถูกลบออกจากระบบถาวร ไม่สามารถกู้คืนได้ ต้องการดำเนินการต่อหรือไม่?', danger:true, icon:'trash', act:'do-delete-booking-record', data:{id:el.dataset.id}, confirmLabel:'ลบถาวร' });
      break;
    case 'do-delete-booking-record': await doDeleteBookingRecord(el.dataset.id); break;
    case 'export-csv': exportCSV(el.dataset.type); break;
    case 'export-xlsx': exportXLSX(el.dataset.type); break;
    case 'reset-data':
      openConfirm({ title:'รีเซ็ตข้อมูลทั้งหมด', message:'ข้อมูลการจองและรอบเวลาทั้งหมดจะถูกลบ และแทนที่ด้วยข้อมูลตัวอย่างเริ่มต้น ต้องการดำเนินการต่อหรือไม่?', danger:true, icon:'trash', act:'do-reset-data', confirmLabel:'รีเซ็ตข้อมูล' });
      break;
    case 'do-reset-data': await doResetData(); break;
    case 'reset-texts':
      openConfirm({ title:'รีเซ็ตข้อความเริ่มต้น', message:'ข้อความ/หัวข้อทั้งหมดที่แก้ไขไว้จะกลับไปเป็นค่าเริ่มต้นของระบบ ต้องการดำเนินการต่อหรือไม่?', danger:true, icon:'trash', act:'do-reset-texts', confirmLabel:'รีเซ็ตข้อความ' });
      break;
    case 'do-reset-texts': await doResetTexts(); break;
    case 'add-mentor': openMentorFormModal(null); break;
    case 'edit-mentor': openMentorFormModal(el.dataset.id); break;
    case 'delete-mentor':
      openConfirm({ title:'ลบรายชื่อนี้', message:'ต้องการลบรายชื่อนี้ออกจากระบบใช่หรือไม่?', danger:true, icon:'trash', act:'do-delete-mentor', data:{id:el.dataset.id}, confirmLabel:'ลบรายชื่อ' });
      break;
    case 'do-delete-mentor': await doDeleteMentor(el.dataset.id); break;
    case 'page': { const table = el.dataset.table; STATE.page[table] = Number(el.dataset.page); renderMain(); break; }
  }
}

async function onDocumentSubmit(e){
  const form = e.target.closest('form[data-form]');
  if(!form) return;
  e.preventDefault();
  const kind = form.dataset.form;
  if(kind==='login'){
    const empId = form.querySelector('[name="empId"]').value;
    const password = form.querySelector('[name="password"]').value;
    await doLogin(empId, password);
  } else if(kind==='book'){
    await handleBookingSubmit(form);
  } else if(kind==='edit-booking'){
    await handleEditBookingSubmit(form);
  } else if(kind==='slot'){
    await handleSlotFormSubmit(form);
  } else if(kind==='nitesh-request'){
    await handleNiteshRequestSubmit(form);
  } else if(kind==='update-internship-months'){
    await handleUpdateInternshipMonths(form);
  } else if(kind==='add-leave-entry'){
    await handleAddLeaveEntry(form);
  } else if(kind==='intern-profile'){
    await handleInternProfileSubmit(form);
  } else if(kind==='edit-texts'){
    await handleEditTextsSubmit(form);
  } else if(kind==='mentor'){
    await handleMentorFormSubmit(form);
  } else if(kind==='safety-history'){
    await handleSafetyHistorySubmit(form);
  } else if(kind==='allowance-config'){
    await handleAllowanceConfigSubmit(form);
  }
}

function onDocumentInput(e){
  const el = e.target.closest('[data-act="search"]');
  if(!el) return;
  const key = el.dataset.key;
  STATE.search[key] = el.value;
  STATE.page[key] = 1;
  const cursor = el.selectionStart;
  renderMain();
  const again = document.querySelector(`[data-act="search"][data-key="${key}"]`);
  if(again){ again.focus(); try{ again.setSelectionRange(cursor, cursor); }catch(err){} }
}

function onDocumentChange(e){
  const sel = e.target.closest('select[data-act]');
  if(!sel) return;
  const act = sel.dataset.act;
  if(act==='feedback-month'){ STATE.feedbackMonth = sel.value; renderMain(); }
  else if(act==='filter-status'){ STATE.statusFilter[sel.dataset.key] = sel.value; STATE.page[sel.dataset.key] = 1; renderMain(); }
  else if(act==='change-timesheet-status'){ changeTimesheetStatus(sel.dataset.empid, sel.dataset.month, sel.value); }
  else if(act==='change-meeting-location'){ changeMeetingLocation(sel.dataset.id, sel.value); }
}

/* =======================================================================
   หมวด 21: Init
   ======================================================================= */
async function init(){
  document.addEventListener('click', onDocumentClick);
  document.addEventListener('submit', onDocumentSubmit);
  document.addEventListener('input', onDocumentInput);
  document.addEventListener('change', onDocumentChange);
  document.getElementById('sidebar-overlay').addEventListener('click', ()=>{ STATE.sidebarOpen=false; renderSidebar(); });
  window.addEventListener('resize', ()=>{ if(STATE.currentUser && STATE.currentUser.role==='admin') renderSidebar(); });

  await loadAll();
  document.getElementById('loading-screen').style.display = 'none';
  renderRoot();
}
window.addEventListener('DOMContentLoaded', init);
</script>
